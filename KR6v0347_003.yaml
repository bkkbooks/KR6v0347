body:
  text: 宗喀巴大師造法尊譯甲二依止無盡慧經分二乙一標經所說乙二解釋經義今初龍猛父子雖未明說依辨了不了義經而辨了不了義然由解釋經義之理義已顯說其顯句論般若燈疏中觀光明論等說依無盡慧經如是安立了不了義故今此中依據彼經如彼經云何等名為了義契經何等名為不了義契經若有安立顯示世俗此等即名不了義經若有安立顯示勝義此等即名了義契經若有顯示種種字句此等即名不了義經若有顯示甚深難見難可通達此等是名了義契經若有由其種種名言宣說有我有情命者養者士夫補特伽羅意生儒童作者受者無主宰中顯似主宰此等名為不了義經若有顯示空性無相無願無作無生不生無有情無命者無補特伽羅無主宰等諸解脫門此等是名了義契經此即說名依了義經不依不了義經其初二段顯以二諦為了不了義謂就所詮分了不了中間二段釋顯示世俗者謂以種種文說種種義顯示勝義者謂顯示一味永離戲論難通達義非別安立後二段明如何顯示為顯示世俗及勝義之理若說似有我有情等是明世俗又非唯說彼即凡觀待作者宣說作用及所作事一切皆是凡說諸法空無生等即是宣說諸法無性凡說無有情等即是宣說補特伽羅皆無自性凡如是說者即是顯示勝義即由此中宣說二種故證前文亦須俱說法及補特伽羅又此非以餘一常法為所別事說無生等是如經說即以蘊等諸法及補特伽羅為所別事顯示彼等皆非實有由於彼事斷除實有即是勝義故名顯示勝義三摩地王經亦云當知善逝宣說空是為了義經差別若說有情數取士其法皆是不了義顯句論說此經分了不了與前經義同不了義經雖為引誘所化而說然非以彼為不了之義是謂彼經之義即於彼經或於餘經須否更為引去解釋也義須引釋又有二種第一理門如云應殺害父母此說所殺父母者除正說義父母之外而須釋為業有及愛第二理門如云從黑白業生苦樂果若有說云由二種業感生苦樂即彼二之真理除彼更無彼二真理故彼經之真實義唯爾決定除彼不可更向餘引當為釋云彼二義之真實應須除彼更作餘釋也故中觀光明論云何等名為了義謂有正量依於勝義增上而說此義除此餘人不能向餘引故若如所說其義有無即為了不了者云有正量即足然猶非足故說依於勝義增上故說從種生苗芽等如所說義雖有量成然非依於勝義而說仍非了義除此義外引向餘義如前已說故說諸法無實生者既有正量如所說義若非彼法真實而亦不可更向餘引如是諸經是真了義以由二種引釋門中皆不能引故若因此義須否更向餘引增上而立了不了者聖教為辨了不了義所相之事須否更向餘引之義立了不了則以世俗勝義為了不了如本地分說依法不依人法有文義二義有了不了二於了義中依智不依識智慧光明莊嚴經亦云所有了義是名勝義無盡慧經說無生等是名勝義故定應知唯無生等是名勝義唯說彼義是真了義若因一處於所破上未加簡別不可便謂其無生等非如言義是不了義如十萬頌說諸法生等是於世間世俗非於勝義一處已加則於餘處義亦加訖故彼等處雖未明說然彼亦是如言之義乙二解釋經義分二丙初龍猛菩薩如何解釋經義丙二彼諸弟子如何解釋初又分二丁一釋緣起義即無性義丁二讚彼即是經心要義今初有經於生滅等有無俱說又有經中說無生等是真了義亦有經說是不了義謂說無勝義生或自相生等如言執義有理違害故說無有自相之性及生滅等意說遍計所執所餘二性是有自相爾時由破何事說為無我其法我者謂於諸法增益自性及差別性是有自相及執異體能取所取遍計所執即說彼等所遠離性為究竟真實亦皆應理然彼違害經實非有謂若自性是勝義有或自相有則說諸果觀待因緣極相違故故仗因緣即無自相有說若無自相繫縛解脫取捨因果等皆不得成是於自相性空究竟能立執為究竟違害此即龍猛菩薩釋般若經及順彼諸經義不可更向餘引即於彼義而為決定是為能立了義之理及顯不順彼諸經如言執義正理妨難而開大車所行軌轍解深密經說若見無自相起損減見俱謗三相者非說凡如是見者一切皆爾是說不具勝慧之機故是依於所化意樂而作是說非佛本意以勝慧機即由因果建立而能通達無自相空以於此機彼即滅損減見勝方便故待彼所化則般若經是未了義解深密經是真了義如四百論說對非說無我法器之機我無我二說前為勝中論亦云若此等皆空無生亦無滅則諸四聖諦於汝皆應無此等諍云若謂諸法自相皆空則無生滅生死涅槃一切建立皆不應理是於般若經等如言執義顯示違害之理其答文云若此不皆空無生亦無滅則諸四聖諦於汝皆應無此等是說若自性不空生滅緣起皆不得成一切建立悉不應理自性空宗如是一切則皆應理說性空義即緣起義龍猛菩薩中論等中以諸正理決擇此理者是釋經說生等無實如言執義無有少分正理違害若無違害則由餘門更無方便能釋彼等是不了義故亦善成彼等是真了義由此意趣顯句論云阿闍黎耶為辨了義不了義經造此中論諸法從滅至異八事有經說有有經說無二者相違為答此諍故如上說又彼論云由未了知如是言說所有密意或有疑惑何為此中真實言說何為此中密意言說或有劣慧執不了義為真了義為以教理二門除彼疑惑及彼倒解阿闍黎耶故造斯論集經論中問何為甚深法答引十萬頌金剛能斷七百頌般若等諸說甚深之經理聚諸論皆以彼等經義為真了義如其所說不可他解義決定故除彼許餘為密意說釋菩提心論云為斷愚夫怖故佛說此等一切皆唯識然非如實義此說破除外境成立唯識是有自性非如實言寶鬘論亦云猶如諸教師先令讀字母如是佛對機說其堪忍法為一類說法令止諸罪惡有為令修福有說令依二有令俱不依對修菩提者說甚深可畏空悲心要法初頌顯示佛於所化與慧相稱而為說法其次三句依增上生而為說法次之一句對於二部小乘種性依補特伽羅無我及有二取而為說法再次一句對於一類大乘種性說無二取而有二空再次三句對緣大乘上慧之機依可怖法皆無自性及大悲心而為說法以是若時見說無實即不能立繫縛解脫等一切建立爾時須分有實不實為說一分無我漸次引導以無安立因果依處其少分空亦不可立故故有經破補特伽羅自性多不破蘊有經破除異體二取而不破除二空自性若時能達緣起之義即無性義是則無須如上分別以於無性之事即能許可一切建立皆應理故以是因緣於業果等少斷見過大乘種性亦有衆多雖破粗分實有然不能破細分更有衆多破細分者則無正量所立一切建立故解深密經所分了不了義是於大乘引多衆生最大善權方便如釋彼經是依衆生增上而說如是與彼隨順諸經亦當了知又作諸論釋彼等密意者如所釋義雖非自許當知亦因所化增上為順彼意而造論釋丁二讚彼即是經心要義如是若以因緣生因即謂諸法皆無自性說性空義即緣起義論師見此較佛餘說最為殊勝是無上聖法故諸論中多就宣說緣起門中稱讚世尊如中論云佛說緣起法不生亦不滅不斷亦不常不來亦不去不一亦不異滅戲論寂固敬禮正等覺最勝說法者六十正理論云為當以何法能斷諸生滅敬禮能仁王宣說諸緣起回諍論云佛說空緣起中道為一義敬禮佛世尊無等最勝說不思議讚云佛說緣起法即是無自性敬禮無等智難喻不思議初論宣說緣起遠離生滅等八第二論說由緣起因遠離生滅第三論說緣起中道與自性空同是一義第四論說即由彼因故生滅等遠離自性一切佛經皆依世俗勝義二諦而轉若不了知二諦差別即不能知聖教真實由二諦門解釋佛經亦即此理以諸宣說種種緣設緣生法者一切皆是世俗諦法由彼道理成無性空唯爾即是勝義諦故七十空性論云由一切諸法皆是自性空故無等如來說諸法緣起唯彼即勝義然佛簿伽梵依世間名言設一切種種如自疏云勝義諦者唯是一切緣起諸法自性本空如此所說許勝義諦除於所破加不同簡別之外其於破事緣起法上唯遮所破之我即安立為勝義諦者兩宗符順故立餘勝義不應道理若許彼實有亦復說為不可救治之見如中論云若復見有空說彼不可治出世讚亦云為斷諸分別故說空甘露若復執彼空佛說極可呵此說彼為極可呵處有法緣起與法性勝義諦見有能依所依者是於名言識前非於根本無漏理智故於彼前唯有法性全無有法而不相違然於觀察諸法自相實性以如何有為勝義有者若無有法則彼法性無力獨立故前宗說若依他起緣起諸法自性空者則圓成實亦無自相此宗亦如是說如云有為不成故無為如何成經云若色尚且不可獲得豈能獲得色之真如二宗皆多次宣說六十正理論云唯涅槃真實言唯彼真實諸行虛妄是欺誑法者謂虛妄不實之義此處說為欺誑故彼違品真實之義亦是不欺誑非觀實性有無之時以有自相說為真實言欺誑者如非饒益詐現饒益說為欺誑此諸行等實無自相現似自相罔諸愚夫故名虛妄或名欺誑涅槃勝義諦於現量前無有如前現欺誑事是故說為不欺真實他宗不許人法是緣生緣起而許彼二是實有者墮常斷見險惡之處自宗雖許彼二是緣起性而許實有及自相有此等亦隨常斷見轉故欲遠離常斷見者當許人法是緣起性猶如水月自性本空謂此道理是離常斷最勝之門六十正理論云諸不許緣起著我或世間嗚呼彼當遭常斷見等奪若有許諸法緣起而實有彼亦云何能不生常等過若有許諸法緣起如水月非真亦非邪彼不遭見劫由非真實而離常見由各能作自所作事非是邪倒不能作事遠離斷見以是若許內外諸法是自性空復說彼空是世俗斷見者則與二大車軌殷重成立緣起雙離常斷俱成相違又多自許為中觀者謂彼與自許諸世俗法以自體空二家相順此二俱是倒執自空之義即自宣揚我無方便顯示此諸內外緣起遠離常斷若說諸事常住外道由不許緣起故許諸法實有是自師宗非可怪處若許緣起依因緣生而許實有是最可笑處六十正理論云若諸說有者執勝事而住彼住其道故無少分希有若諸依佛道說一切無常諍執諸勝事安住此甚奇此說若於無實及無自相而許不可立生滅等是可笑處由此緣起遠離常斷極難通達故佛念云我所證得此甚深法為他宣說莫能通達且當默住中論云由知有執者難達此法底是故能仁意退轉不說法若如前宗無斯難事言是故者謂由倒執此理成大損失由無勝慧亦難通達故當斷除俱謗此法文義及單謗義并無安立業果等處諸斷無見而當勵力知真實義寶鬘論云如是邪執者當得諸衰損善知獲安樂及無上菩提故於此當斷誹謗及無見為成一切義當勤求正知論師解釋甚深經義宣說無量正理異門當知餘門皆是通達此義支分於中觀義精勤修習此正道理已於餘處數數宣說復欲廣造中觀論釋故於此中略說爾許丙二彼諸弟子如何解釋龍猛菩薩上首弟子謂聖天論師此造瑜伽師四百論廣顯龍猛菩薩之軌佛護清辨月稱靜命等諸大中觀師皆依為據等同菩薩故如先覺說此師徒之論為根本論故此當說聖父子後解釋此等意趣之理又勇論師及龍菩提等雖有衆多大善巧王然彼等所釋中觀之論未見有譯故當宣說餘有論者有大差別之宗此中分二丁初自續中觀師如何解釋聖者諸論丁二應成中觀師如何解釋聖者諸論初又分二戊初清辨論師如何解釋戊二靜命父子如何解釋初中分三己初於勝義中如何解說人法有無自性己二於名言中如何解說有無外境己三顯示破勝義有以何正理而為上首今初論師所造諸中論中根本慧論為主其釋有八謂無畏論提婆沙摩論古拏摩底論古拏室利論悉提羅摩底論并佛護清辨月稱之疏觀音禁說清辨是依提婆沙摩論釋現白論其無畏論解二十七品云大德提婆亦云聞者及所聞說者甚希有故略說生死非有邊無邊此引四百論證故非自釋佛護清辨月稱釋中皆未略引彼釋故亦可知清辨解釋菩薩意趣時如何解釋二無我勝義若知此師決擇三相之理則極明了此如般若燈論云此中若謂無色意言及色名言遍計所執性是謗有事以謗意言及名言故此說遍計所執相無自性時若謂遍計所執是能遍計自性差別之分別與名者彼二是蘊所攝則謗依他起為相無自性故許依他起是有自性解深密經說由無自相故名相無自性彼等即是決擇經意故許依他起有自相性極為顯了般若燈論云遍計所執名相分別正智真如五法之中悉皆不攝故是相無自性此出敵者是攝決擇分說彼非五法所攝彼中說名是不相應行相是所遍計事遍計執乃無事故非四法唯是分別假立故亦非真如辨中邊論說名攝在遍計執者安慧師說是名假立義非名自性彼論說相是依他起者意說行相以攝決擇分說相中亦有無為故雖由五法不攝之理是相無自性然彼不攝非相無自性義名言中有應成派論中亦多說名自性自體及自相等此師論中復多說云無有自性自性不生無實物等故極難辨別然釋解深密經所說有無相自性之義是此論師許諸有事於名言中有自相之證最顯然者故於人法雖未通達無自相之自性然亦自許完全通達二無我相非唯由自相成其由破何法立二無我之所破下當廣說又般若燈論云若謂任誰由彼二法所遍計義彼即非有譬如於繩妄起蛇覺然遍計執非無所有以現彼相亂覺所計雖無所有然名言中於盤蛇上彼非無故此謂若說遍計所執非能遍計是隨愚夫名言分別所假立義彼中無相自性如於繩上妄計為蛇此顯彼喻非理之過義云若於色等假立自性差別之義謂彼彼等是相無自性如於繩上妄計為蛇謂無彼義此不應理若他於繩妄執為蛇義雖非有然於盤蛇而執為蛇於名言中彼義實有如是於色若執為受其境雖無然於色上即執是色彼境可說名言有故此中有無是說相自性有無故說於色等上所計自性差別之境非於名言無相自性若名言中說於盤蛇而無蛇者世間違害如云若於盤蛇執此是蛇無彼境者若於勝義簡有事者是隨中觀說如云若於盤蛇而執為蛇成立彼境為勝義相無自性者是中觀宗般若燈論云故若欲說增益自性差別遍計所執相無自性者應當受許中觀正理正理者如中論云由遮心行境即遮諸所說不生亦不滅同法性涅槃此復非說於大腹上假立為瓶破彼名言所立之境於勝義有而須中觀所有正理分別熾然論說聾啞等類不善名言然亦了知瓶等之義牛等畜類由色香等亦能了知自他犢子故名言所立非法真實瑜伽諸師與中觀師所許相同故云此是色此是色生等其能遍計所著之境即是由彼所遍計義此於名言是有自相非相無自性故說破勝義有為勝義相無自性乃是經義經說遍計執相無自性其遍計執謂所著境是勝義遍計執言彼唯由名言假立者義謂唯由名與分別之所假設故不應妄說依他起性是相無性非遍計執若不爾者瑜伽宗中計依他起自性差別所計自性而無自相亦不可說是遍計執相無自性故故於勝義若色自性及色生等空為圓成實乃是經義說瑜伽師所釋則非經義如是經說依他起性由無自生名生無自性言無自生者與餘經說無自性生無自體生此論師許其義相同亦即說為勝義無生義由是當知言自性生者即是由自相生若於有事破彼生時決定須加勝義簡別以於世俗許自相生故諸瑜伽師亦許解深密經所說自生與諸餘經說自性生其義相同許無彼生即無自然生故雖無彼生然不許全無勝義生若依他起是真實有則如所現應如是住經說如幻則不應理故說彼自性空乃是解深密經義己二於名言中如何解說有無外境當說諸世俗事境識何攝聖者父子未顯分說於名言中有無外境然此論師於名言中許有外境又許根識有相而取若無境相則不取著又許彼二前後因果十地經說三界唯心者破外宗說離心別有世間作者乃是經義非破外境楞伽經云外境悉非有心似身財處現為種種事故我說唯心亦許此經非破外境故破外境似許全非任何經義應當觀察經初句義謂諸外境非自性有般若燈論說如同身財處所等境生種種心者謂似彼境行相而生唯心之義如同前釋和合而成色聲等時一一極微皆與根識作所緣緣故彼於識非不顯現如軍林等依異類成是假和合雖無實體然依一事同類極微名為和合是有實體瓶等亦爾其現二月等識亦須依一月所緣而生無外所緣則不得生若無外境亦謗經說從所緣緣生諸根識以於勝義及名言中從所緣緣生皆不應理故故亦不許阿賴耶識若許彼識雖無外境由彼習氣成熟力故亦可安立似境識生則計外境悉成無義故中觀心論云由說識異門即顯示有我由不許彼亦不安立染污意識又前論云離見境所餘自心如何現謂識現似外境行相及不現彼相唯現能取領納自體故說識二分謂自體及外境其外境即前所領故自證與彼為能緣所緣如是所立諸所緣緣雖於名言亦皆破除故亦不許有自證分其許自證分之理此最明顯智藏論師釋中觀時亦於名言不破自相許有外境與此宗同己三顯示破勝義有以何正理而為上首問此論師破勝義有以何正理而為上首除以一二遮因破外皆以相違可得因破意令易了例如舉因與所立法隨行喻云眼於勝義不應見色以是根故譬如耳根又云地界勝義非堅為性是大種故譬如水界以如是等比量成立聖父子論中多說因齊平頭正理此即依彼而為上首意謂堅及見色若有自性同是大種應無堅不堅之差別同是根故應無見不見色之差別以辨如是差別之因不可得故謂若勝義有如所顯現應非由心增上而立是由自體增上而有若爾即是自然而有全不待他故無量能辨彼等差別譬如烟生若不待因舉過謂當觀待一切或亦不應觀待於火若有自性即勝義有應離因緣及和合性別有自體單獨而住然諸大種大種所造是八微合心及心所無則俱無一切有事皆待因緣和合而生若離因緣則無所有是故說為無勝義有及無實體離和合外顯示別無獨立性者多由顯示若勝義有應獨立有次即於彼出過而破然不多如諸餘論師於分有分用一異理觀察而破善解菩薩諸大弟子用何正理而為上首慧力增長極為有力故於此宗破勝義有出因相齊平頭之理亦當善學戊二靜命父子如何解釋分四己初於勝義中如何解說人法有無自性己二於名言中如何解說有無外境己三如何解說解深密經義己四顯示破勝義有以何正理而為上首今初解深密經說相無自性及生無自性之義如清辨師意中觀明論所釋靜命亦許故於名言亦許自相所成自性又由其許七部量論等安立因果之理亦可了知己二於名言中如何解說有無外境於名言中有無外境此如般若燈論云若先許唯識後仍遍捨者與其以泥污後而洗初即勿觸遠離為妙如達外境全無自性亦當如是通達內識無我無生釋論說為瑜伽師宗先為悟入世俗諦時破除外境受許唯識後為通達勝義諦時亦捨唯識此說與其先令執受內識實有後仍破除寧如最初即說無實為妙如境無實亦能通達識無實故有中觀師許於所化必須如是次第宣說顯然亦破如是有云彼二非同時修應次第修前論破云先即同修無須慳吝釋論說是瑜伽師意余意如前如斯宗派雖尚有一二然中觀宗造諸廣論說於名言無外境者如智軍論師說靜命論師是開創者極為善哉如中觀莊嚴論自疏中云若有受許因果諸法欲答一切諸惡敵難應觀何義為世俗事唯心心所為自體耶抑為亦有外法體耶此中有依後義者如說經說唯心破作者受者故有餘思云雖諸因果法亦皆唯有識諸自所成立亦皆住唯識此引中觀心論立外境之宗如前已說言有餘思者謂自所許為依何經作如是說如論自疏云若如是許與厚嚴經解深密經等所說皆相符順楞伽經亦云外境悉非有心似外境現如此所說亦為善說如是依止唯心之理少用功力即能通達補特伽羅我及我所與能取所取異體等皆無自性若有慧力增上精進以一異性觀察其心見勝義中無堅實性則達勝義離一切邊中觀之理中觀莊嚴論云由依止唯心當知無外事次由依此理當知心無我此如楞伽經云因緣皆退轉亦定遮其因安立唯有心故我說無生諸法無外義心亦不可取離一切見故是為無生相莊嚴論中即釋此說論疏中釋初頌顯示唯識宗之無生第二顯示中觀宗之無生在名言中由外境空是唯識理在勝義中一切諸法皆無自性依此二理能得大乘即前論云御二理大車掣轉正理銜彼達如實義當獲得大乘若謂於名言中無外境之理是龍猛菩薩意趣者彼由何論顯示斯義中觀莊嚴論云此中亦云此中皆無生亦皆無有滅故諸生滅法當知唯是識宣說大種等皆是識所攝彼離智所見豈非皆顛倒引此頌文成無外境其中後頌是六十正理論文若謂初頌顯示唯識云何說有大種及大種所造耶後頌顯示由識現似彼等而立彼二故識所攝若勝義有隨云是識或是外境然於正智皆不顯現故是顛倒疏說初頌是引楞伽寂靜論師說彼二頌皆龍猛造謂此顯示唯識故許中觀唯識二宗相同蓋想靜命一文而引也然彼論中造者雖異作一文引餘亦有之此宗許青黃等相是有事攝法稱所許亦如是釋故於名言是如實相派之中觀師於名言中安立自證雖未明說安不安立阿賴耶之理然是不許之宗於名言中許青黃等相非是有事如假相派之中觀師者俱生金剛論師云是如羅嚩跋論師所釋也己三如何解說解深密經義若爾此宗於解深密經義為如瑜伽師所釋耶抑別許耶中觀明論云是故世尊解無生等唯依勝義增上而說及顯三種無性密意明離二邊處中道故安立唯是了義之經此說解深密經解釋三種無自性意以彼二義成立般若經等是了義經此復損減世俗自性及增益執名言所無常住等事並執色等如現而有彼皆不能悟入勝義為除彼等增減執故而說以破說無生等隨言執著故顯凡說無生滅等皆依勝義增上而說由是應許於名言中有生滅等故除損減依他起相由依仗他緣力而生非自然生故名生無自性諸有智者凡依緣生即便許為自性本空此同無熱惱問經云諸依緣生即無生彼中非有生自性此說緣生無自性生故依他起非以從因緣生即成實有若不爾者幻等妄法亦當皆成實事由無諦實與幻無別故解深密經密意宣說依他如幻由是因緣若執無常等事為勝義有即遍計執如所遍計而不成實故說遍計執為相無自性此除增益又於依他起性執為遍計所執者須為顯示如其所執相自性中無依他起故於依他起勝義無性說名相無自性亦無乖違解深密經由遍計執無自相故說名相無自性餘二自性不由無自相故名相無自性者以餘二性勝義無性即遍計執由自相成相無自性之義是此宗所許故勝義中由無自相名相無自性離增益執由名言中有自相成相自性故離損減執最為明顯故依他起若無自相則謗因果同瑜伽師其差別者此宗是說於勝義中無有自相瑜伽師說若有自相即勝義有解深密經說於色等增益自性差別中依他起法皆無自相是依他起遍計執空之義此宗亦如清辨論師許為所著之境與前說同復有難云有諸經中說一切法皆無自性及無生等是不了義解深密經等顯示彼經密意義故中觀明論答彼難云是故雖顯密意然是了義亦無相違以即成立說無生等是了義故與現見等離相違故破除隨言起執著故如解深密經云次引經說依法無我勝義無性說無生等文言是故者謂解深密經說是一切法勝義諦故亦是無性之所顯故名為勝義無自性性其無自性即此經說一切諸法唯無自性故解深密經解釋此經說無性等所有密意破除隨言所起執著成立了義中觀諸師由於勝義許無生等而許世俗生等故於宣說無生等語非是隨言而起執著此宗意謂若執全無生滅等是隨言執著若於勝義許無生等非是隨言而起執著設有難云若如是者第二法輪說無自性及無生等此經說彼是未了義即成相違以由此經成立彼等是了義故中觀明論雖斷此諍然其意趣謂說是未了義與顯其密意成立了義若是一經雖成相違然非一經僅同是第二法輪此如般若心經中未明顯加勝義及諦實之簡別直云無色等不可唯如所說隨言執著更須引釋故非了義引釋之理謂勝義中無眼耳等非名言無故須更加勝義等簡別由是因緣如十萬般若於所破上已加勝義簡別者義謂成立如言了義故說第二法輪是未了義者義謂非指一切第二法輪解深密經於說無性無生滅等雖破隨言執唯是實然未破除於勝義中執無性等為隨言執合觀前後若執無有自相之性及生滅等是隨言執此經宣說由無自相名相無性亦是破除勝義中有由許名言有自相故故如上釋總之惟為趣大乘者轉第二輪彼於所破勝義簡別有加未加如後經說不可隨言而起執著應知猶如前經所說謂生滅等於勝義無於名言有是為解深密經所釋故許解深密經是樹立十萬般若等為了義之經此解釋初說為不了義之理易解不說若作是思諸瑜伽師所立三相若非此經之義豈許全非任何經義耶中觀明論蓮華戒造云解深密經入楞伽經厚嚴經等遮遣外境成立唯心有時不破心自性者是為隨順未能頓證一切諸法皆無自性須漸導者意樂而說謂彼經中共有二機為能頓證一切諸法皆無自性所化而說及為前機故須分別立彼經義藏譯靜命論師諸論雖未如前明說決擇三相之理然此二師意趣相同如瑜伽師所釋解深密經三相之義非是經義清辨解為中觀道軌詳如中觀明論中說若能詳知二派釋經之理即能了解諸大論師無量正理及釋經軌己四顯示破勝義有以何正理而為上首分二庚初明理所破庚二如何破除今初若許諸法於名言中有自相性而除彼外說所破事名為實有或真實有或勝義有其相云何此中若未善解執實有等執著之理或彼如何執所破之總相唯依於無實等名而說衆多若如是有有此違害及非彼有有此能立然終未能善解其義故明所破極為切要此如論說地等勝義非大種性其釋論分別熾然云所言義者是所知故說名為義即是所觀所了增語所言勝者是第一名總云勝義者謂此是義亦是最勝故名勝義又勝之義名為勝義以是殊勝無分別智之義故又順勝義謂證勝義隨順慧中有彼勝義故名隨順勝義三中後說是此處義分別熾然論云勝義有二一謂無作行轉出世無漏永無戲論二謂有作行轉隨順福智資糧世間淨智有諸戲論今即以此為宗差別故無過失此中亦許觀擇勝義所有理智非唯聖人後得理智由是因緣中觀諸師與餘宗師觀事有無云於勝義無彼事者義謂於觀勝義智前無有彼事云彼非有此師論中除此之外更無明說智藏論師二諦論等中觀莊嚴論及自釋中亦無明說中觀明論云於真實義由聞思修所成諸慧一切皆是無倒心故同名勝義以此之義是最勝故然有現證不現之別彼等皆由意樂增上了知此等一切諸法皆唯無生故言勝義無生者即說正智者不成立彼等之生此說三慧由境是勝義故皆假名勝義由以正智不成其生故說由彼意樂增上名為無生二無我義由具正理名之為勝樂斷障者為證此故而發希求及是無倒勝智境義是故說為真實勝義如是真實亦指理智由彼增上名無自性非名言識或指真實性體觀真實相亦無所有是莊嚴釋論中說若法生等是真實有則以能量諸法勝義真實義慧應能成立然以彼慧不能成立故說生等非是諸法真實中有即彼名為勝義無生若爾如何有生名真實有耶譬如幻化象馬所依木塊等物於迷亂目現象馬時不可說是唯於識前現似彼相非木等物現似彼相如是苗芽現從種生亦不可說唯於識前現似彼生非是彼苗從彼種生若爾苗芽自從種生應即勝義生答云無過如幻化事雖彼自體現為象馬然由眼識迷亂之力乃如是現非從本來因緣所生即現為彼若不爾者於不迷眼亦應亂現如是從種生諸苗芽亦由於諸名言識前如是顯現增上而立非諸苗芽由自體性增上而生由是因緣若謂不由自能緣心顯現增上安立而執苗芽由自體性增上而生即是執為有勝義生依此應知言勝義生及真實生亦應了知一切餘法有無勝義及真實義諦實生等此如中觀明論云彼於一切有情現有實體故由有情意樂增上見一切法虛妄自性應當說名唯世俗有謂從無始習氣所生諸世俗心於勝義無性亂見為有即由彼故於諸有情現有實事故由有情意樂增上立為有者名世俗有此相違品即勝義有故應依此而說一切自續中觀諸宗亦皆同此又如二種俱生我執雖非唯由不觀察心顯現增上而能安立為名言有然由於名言識顯現增上無有餘量能為違害即能安立為名言有在此宗中由如是識顯現增上所立名言自性亦許為有故簡別云若非由其自能緣心顯現增上之所安立若彼諸事由實執境空所顯空性雖許是彼諸事勝義實性然說彼性若非由其自能緣心顯現增上之所安立而由實性增上所立亦不得成由此應知空空之義上說實執即是此宗俱生實執即俱生法執不善言說諸有情類雖不合執彼等名義然有義執故實執境若於彼有即能出過謂應堪忍觀擇究竟正理之所觀擇及應許有無分之事應具自性三差別等然執有彼等却非實執之義以破彼執仍不能成無實義故若未善解此宗實執之義謂凡理智有所量事即是實有昔諸先覺亦有許此或許理智全無有境或有妄辨理智比量立境有無總應先知俱生法我執義凡破法我一切正理應知皆是或正破此或此支分聽聞講說思惟當觀於自身此執能有幾許違害應知是為主要教授自部餘宗說無我時亦如是觀庚二如何破除破除如是所破之理以何為主此宗破除所破之因除一二外皆依不見係屬之因中觀莊嚴論說依楞伽經及父子相見會以離一異因為能立中觀明論說金剛支理破有無生破四句生及離一異亦說緣起因此即見相違因顯示他宗相違究竟者謂隨自他部所許何事先依時間或依方分或依心識緣境相等顯示無有非多分集無分之法次即成立具足多分於一法上具多分性雖名言義容不相違然勝義中分與有分二性異者則無係屬若一性者諸分應一有分應多由顯此過破除諸法於勝義有此即勵力解說提婆離節無餘指等道理譬如破他生時常與無常二品決斷破從常生於無常中同不同時二品決斷破同時生不同時中先壞未壞二品決斷破從壞生先未壞生有無間隔二品決斷破間隔生此等稍易次從無間隔生中謂一切體全無間隔及一分無隔二品決斷若如初說二時應雜譬如極微二塵相鄰一切體分全無間隔則雜一處若如後說則有支分故成世俗此是中觀明論所說顯示過難究竟界齊即於分及有分觀一異破如破他生亦說衆多違害理門智藏論師二諦論中破實有時根本道理即破四生其究竟違害亦與靜命父子相同此等皆是隨行龍猛廣大理路樂於正理求廣慧者應當修學若知自續宗中此諸道理餘宗道理亦易了解故不廣說
