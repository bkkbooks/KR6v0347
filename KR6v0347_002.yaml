body:
  text: 宗喀巴大師造法尊譯庚二明自宗無違若如菩薩地及決擇分說依他起是勝義有者云何解深密經說凡諸有為皆非勝義如云如八支聖道展轉異相若一切法真如勝義法無我性亦異相者是則真如勝義法無我性亦應有因若從因生應是有為若是有為應非勝義辨中邊論云勝義唯一性其釋亦云勝義諦者應知唯一圓成實性莊嚴經論說勝義諦具五相時說無生滅如云非有無自他無生滅增減非淨非不淨是為勝義相釋論亦云由遍計所執及依他起相故非是有由圓成實相故非是無決擇分云問相當言世俗有當言勝義有答當言世俗有又云問分別當言世俗有當言勝義有答當言世俗有豈不相違耶不違之理茲當解釋謂安立世俗及勝義有有二理門第一理門由名言增上建立有者名世俗有非是由彼增上安立由自相有者立為勝義有如經多云此亦是由世間名言增上非由勝義此即中觀師與內外道諸實事師於勝義世俗有無諍論之處依此增上如前所說第一自性於世俗有非於勝義後二自性於勝義有於世俗無故菩薩地及決擇分如前而說又決擇分云若諸名言熏習之想所建立識緣色等想事計為色等性此性非實物有非勝義有是故如此色等想法非真實有唯是遍計所執自性當知假有若遣名言熏習之想所建立識如其色等想事緣離言說性當知此性是實物有是勝義有實有假有亦如決擇分云若有諸法不待所餘不依所餘施設自相應知略說是實有相若有諸法待於所餘依於所餘施設自相應知略說是假有相非實物有謂如依蘊假立為我或為有情又於此宗若不觀待先取餘法而不可取待餘可取是假有法與非唯由名言建立是自相有亦不相違如賴耶習氣雖亦說是假有而與前說是勝義有全不相違若是唯由名言分別施設假有則成相違第二理門如辨中邊論云勝義諦亦三謂義得正行其釋論云一義勝義謂真如勝智之義名勝義故勝為無漏根本正智其義即境故云勝義或勝之義謂無我義真如彼亦即是清淨所緣勝義於彼勝義無餘二性唯圓成實故如上說辨中邊論又云淨所行有二依一圓成實釋論亦顯然說云唯依圓成實立所餘二性非二淨智境故言二智者謂二障淨智此宗由許彼智是親自證智亦應是境答由待何境為達真實意取彼境故無過失如斯勝義是無為法雖於如斯勝義非有然於自相建立勝義中有非由名言增上建立此宗無違智藏集論云識離能所取許為勝義有度慧海彼岸瑜伽師論說此勝義有亦就前理門中觀諸論與瑜伽師諍論有無依他起者非依名言增上皆是諍論勝義有無故應善辨二種勝義論師兄弟論中亦多依後種建立勝義初二自性世俗有者如決擇分說相及分別世俗有之因緣一雜染起故二施設器故其中初義如解深密經說清淨所緣名為勝義故若緣何法而起雜染即由彼義立世俗有與集論同第二義者謂是名言假立自性及是施設名言依處名世俗有相是言說依處之事解釋正理論云謂於世間錯亂識境及於出世無錯識境密意宣說二諦為世俗諦及勝義諦由能顯了是世俗故彼所決諦名世俗諦以是顯了所詮事故譬如二足登處名為足橙船所渡處名為船墩攝決擇分說通達真如根本正智是勝義有意謂無前立世俗有二因緣故說後得智是世俗有及勝義有者由緣世俗相故說名世俗有由施設器相故及起雜染緣故名世俗有與由有自相故名勝義有亦不相違解釋正理論敘聲聞乘諍云勝義空性經說有業異熟而無作者若是勝義云何一切諸法皆無自性若是世俗於世俗中可有作者云何無耶答彼難曰當知何是世俗勝義由此能知彼二中有當問何為二諦若謂名顯了假立言說是名世俗諸法自相是名勝義若爾業及異熟俱於名有亦自相有故彼二法隨欲皆有其勝義有是前理門其世俗有是後理門義於彼二俱應云有又說於彼勝義雖許是有然此不許說勝義中一切諸法皆無自性是了義教故於此宗無相違過補特伽羅是世俗有非實物有業及異熟是世俗有亦實物有以是世間識境界故於第二理門非勝義有彼二亦非出世智境以彼智境是離言說總相故有大乘師說一切法皆無自相唯世俗有則有前文所說妨難依釋正理論說極為明顯辨中邊論云謂假行顯了此於粗分真實世俗諦中分為三種一假世俗二行世俗三顯了世俗如其次第配三自性諸餘經中說真如等世俗有者應知即依第三世俗密意而說如是若能詳辨上下諸宗實有假有世俗有勝義有及一宗中安立彼等差別道理則能善決擇諸重要宗派及能了知實事師說衆多假有及世俗有然中觀師尚須於彼立勝義無若未能爾徒欲分辨上下諸宗差別而已戊三餘論所說分二己初莊嚴經論所說己二辨中邊論所說今初莊嚴經論云自然自體無自性不堅住如執取不有故許無自性謂於三有為相及如凡愚所執自性非是有故密意說言皆無自性集論則說方廣分經依彼二義及三無性密意說言皆無自性謂諸法仗緣是無自性無自然故此義如中觀明論釋為無自體生諸法已滅不能仍生彼法體性是無自性無自體故現在未滅是無自性以剎那法於第二時不能安住自體性故總謂未來苗芽不自然生過去苗芽不重復生現在苗芽不能住於第二時故說三世諸法皆無自性如諸愚夫或執常樂我淨或妄執餘遍計所執相由無彼自性故名無自性是世親釋言餘者謂執能取所取實體各異如無自性無生亦爾如無生故無滅亦爾等前前為因成立後後即前論云由無性故成後後所依止無生滅本靜自性般涅槃如前已釋論又云於始自餘相自相自然異雜染及差別說無生法忍經說得無生法忍此釋諸法無生之理其中始者謂生死中無始初生自謂前念先生諸法彼法自體不復更生餘謂後念先無之相後不新生是釋論說此義如中觀明論說生死中先無有情後不新生要前者滅同類乃生故法先無則後無生自相謂遍計所執彼畢竟不生無自然生謂依他起無變異生謂圓成實無雜染生謂得盡智時無差別生謂佛法身如此解釋無自性義及無生義者因此宗不許說一切法勝義性空及諸有為勝義無生為真了義其三世法無自性義唯除現在及如愚執無自性義亦共小乘兩宗毗婆沙師說法生後有住作用住後又有壞滅作用若謂解深密經說依他起猶如幻事莊嚴經論說一切有為皆如幻事故諦實有非彼正義答非如幻等即便決定不說諦實要在采取幻喻等義莊嚴經論云猶如起幻師譬虛妄分別如彼諸幻相譬說二種迷世親釋說譬如幻師於木石等誦以咒術為迷惑因虛妄分別依他起性亦爾是初二句義譬如幻相現為象馬等像依他起性現為異體能取所取亦爾是後二句義莊嚴經論又云如彼無體故如是為勝義如彼可得故如是為世俗釋論中說如於幻上全無象等如是於依他起全無二取是勝義諦如於幻事見有象馬體性可得如是虛妄遍計所執見有可得是世俗諦莊嚴經論釋經中義謂內六處無我命等現似為有說如幻事又外六處實非補特伽羅我所受用現似為有說如夢相未曾說為內外有為自性本空現有自性之喻攝大乘論釋般若經幻事等喻譬依他起云何實無外義而成所行境界為除此疑說幻事喻云何無義心心法轉為除此疑說陽焰喻云何無義有愛非愛受用差別為除此疑說所夢喻等即以幻事作不實喻亦須分別中觀唯識於不實義引喻之理勿令紊亂己二辨中邊論所說辨中邊論云虛妄分別有於此二都無此中唯有空於彼亦有此故說一切法非空非不空有無及有故是則契中道初頌顯示空相次頌顯示妙契中道如云若於此非有由彼觀為空所餘非無故如實知為有若能如是正知有無則能無倒悟入空性此亦顯示彼義故正明空性言於此者謂空依處即虛妄分別依他起性言非有之所無者即能取所取有實異體遍計所執言於此都無者顯示前由後空若彼非有彼餘何有謂分別有及第三句顯依他起及圓成實其第四句除餘疑惑世親菩薩如是解釋何法為空及由何空義安慧論師更為光顯如疏鈔云有作是思一切諸法都無自體猶如兔角故謗一切為遮彼故頌曰虛妄分別有謂有自體之增語分別有句非唯齊彼便為滿足尚須引餘即有自體由是非說分別略有是自體有或自相有如是有者圓成實性亦爾第二句文除疑之理疏鈔又云若如是者經說一切諸法皆空豈不違經答無相違謂於此二都無虛妄分別由離能取所取自性故說名空非全無自性故不違經此說若依他起有自性者經說一切諸法皆自性空成相違失答中謂彼分別外現所取內現能取能所分離於如是有自性所空密意說言皆自性空非說全無自相自體無著兄弟論義實爾即於彼有亦名勝義有故說依他起自體空全非此宗之義第三句文除疑之理疏鈔又云若彼二取猶如兔角都無所有虛妄分別於勝義中是自性有如是則應全無空性答非如是謂此中唯有空於虛妄分別上其能取所取無性即是空性故空性非無言分別有及二都無顯示有者為前無者為後故起疑惑謂無空性難云若其分別於勝義中是自性有者是舉意許若有自相即勝義有答中不云我不許爾於許彼上而作答釋又此論師三十頌釋云或執所知如識實有或執內識亦如所知唯世俗有非勝義有皆墮一邊為遮彼二故造斯論說依他起非都無者是如前引菩薩地說破許全無或一切種無勝義事非破彼許所知非有第四句除疑理謂於分別若有二空何故不證由於彼空有現二相錯亂分別以彼障故若一切法是一向空不空有無皆墮邊執非契中道為遮彼故說第二頌由有空性虛妄分別故說非空由無所取能取性故說非不空一切法者謂虛妄分別名有為空性名無為說者謂般若經等說一切法非一向空亦非一向不空應如世親所釋善符經義若謂非空即圓成實非不空者即餘二性非是經義有者謂有分別無者謂二取性有故者謂分別與空性更互而有當如世親師徒所釋有說彼二由一實有餘一即空違前而說不應如彼所許而釋安慧論師引迦葉問品別說有無各是一邊彼二中間即是觀察諸法之中道釋為是則契中道之義故唯識宗解釋彼經是中道義餘中觀師雖說彼二後勝於前然此宗許彼二義同如是世親安慧解釋之理處處已說陳那論師於八千總義論中解釋八千頌義與攝大乘論相符法稱論師釋量論云其中由無一二亦俱失壞是故彼二空即是此實性謂能取所取無異體空所顯空性是依他起真實義性彼又解釋經說諸法皆無自性之義如云諸事異相住要依異相識此識既迷誤彼異亦誤謬除能所取相餘相無所有由彼相空故故說無自性謂諸有事生等異相非唯自證便能分別要由現似二取相識乃能分辨現二相識迷誤虛妄由彼所立亦應虛妄離能所取既無餘相所現二相如現非有故說無性釋量論又云由蘊等差別安立一切相用別非彼性故說彼離相凡說色蘊等是所相質礙等是能相皆由能作所作差別雖許彼相所依實有然能作所作分則非實有故密意說皆自相空此說共小乘部釋量論又云若一切無能見種生芽等若許是世俗云何能如是此與前文決擇分說同一宗要此等解釋誠恐文繁故不詳述丁二別破增益邊分二戊一明所破增益戊二如何破彼之理今初此宗正理所破有二一損減邊唯由惡宗假立即是內教無自性宗如前已說二增益邊又有分別俱生二種其分別者即外教及內教小乘兩宗所計其俱生中增益人我至下宣說故今當說增益法我以諸宗派妄計法我亦為成立俱生所執法我有故及是正理正所破故此宗教典除說執異體能取所取是法我執外多未宣說餘法我執解深密經說依他起由遍計執自性差別皆無自相是相無自性即法無我由此返顯於依他起執其假立自性差別是有自相即法我執菩薩地決擇分攝大乘論亦多勵力成立彼所執空所顯空性是究竟中道義及法無我圓成實故若未知於依他起增益法我遍計所執必不能知此宗之法我執及法無我若執遍計所執是有自相即法我執其遍計所執者謂於蘊等假名安立此即為色此為色生等或自性相或差別相假安立性然於彼中蘊等容有故執彼有非是增益要執蘊等於彼自性為自相有乃是增益其破色等是名言境由自相成若破能詮親境然親所詮能詮總相總名是無事者小乘兩宗皆已極成故依他起由彼故空無須更成又以成立彼空之量亦不能成法無我性緣彼空修亦不能淨諸所知障故與解深密經說遍計執無自相空即法無我圓成實性及菩薩地說彼空性是所知障清淨所緣皆成相違又破色等是言說所取之境若破取境所依自相有者則破依他起是自相有若唯就取境自體破自相有然比量所量共相無事經部極成故不應理又轉有經云以彼彼諸名詮彼彼諸法此中無有彼是諸法法性此教於小乘部亦皆成立未見解深密經所說遍計所執空之法性更能過此又此空理中全無破除異體能取所取之真唯識義故說彼是法無我性及所知障清淨所緣云何應理故當說此宗何緣能無彼等相違茲當解釋如此空理菩薩地說是所知障淨智所緣及是無上永離二邊契中之道攝大乘論說由入此門悟入唯識故小乘宗非已極成故許此違品增益謂執色等於假名安立自性差別中是自相有諸小乘部亦有彼宗以破彼時菩薩地中引聖教破若破他教則必下可引自師教故所破境定有自教又非是破無自性師與瑜伽師所有別派定是小乘部故不引申解深密經唯引於彼極成三經而為破執此中先明俱生增益決擇分云復次由五因緣當知愚夫如名如言於所詮事執有自性謂若問言此事用何以為自性答言是色自性非答言是色名為第一因緣此中義者謂若問云言色之義以何為性則必答云色是自性而不能說言色之義唯色假名為其自性是故假立色名言時青即施設為色名言依處若觀察彼如何現顯則覺非由名言安立是由自體增上實爾若執彼青如現實有是於青上假名為色增益執著為自相有諸愚夫類有如是執由前文成立小乘兩宗亦許彼執是應理執彼雖許聲所詮自體是分別假立然許彼所依分是自相有故此與彼豈得相等其增益差別遍計所執及增益餘法之理亦由此當知如是現有心境二時如現彼二似有異體執為實有亦是增益法我妄執其餘諍難下當詳答戊二如何破彼之理分二己初正破己二斷諍今初解深密經未說成立依他起上遍計所執空之理為通達故菩薩地及決擇分各說三種正理攝大乘論先設問云云何得知如依他起自性遍計所執自性現顯而非稱體答云由名前覺無多名不決定成稱體多體雜體相違故此中由稱體相違成立依他起上遍計所執空若顯了說例如大腹為瓶名言所依處所若彼即是大腹體性或自相有則非名言增上安立若如是者隨名言覺亦應不待名言於未施設瓶名之前於大腹上亦應起覺知彼是瓶由於一事多體相違而成立者如敵者意於一事上而有百施因陀羅壞聚落等多名轉時皆由事體增上而轉應成多體如於分別現顯即彼事體如是住故不雜亂事雜體相違而成立者如敵者意於二丈夫同名近護一名轉時則彼二事應成一體起近護覺無差別故名及分別皆由事體增上於彼二轉故若執色等分別依處是勝義有或自相有與執假名依處是自相有相同故不善名言此名是此者亦有所破增益破彼之理亦皆相同菩薩地破云要先有事然後謂此是此制立假說先未如是立假說時彼事應無自性若未立時先有自性後立假說是則未立假說之時應於此事而起色覺小乘兩宗雖作是說若彼施設名言親境於事自性是自相有則應不待施設名言起名覺等有上過失然說色等分別所依名言處所是自相有無彼過失然過相等如是色等分別所依雖彼亦是名言所立遍計所執然是量成不可破壞若謂此即彼事自相則是唯名假立遍計所執彼於所知決定非有故名言所立又有二類謂量成不成然此宗許凡是名言所安立者即無因果小乘兩宗若破色等分別所依名言處所為有自相則不能知立彼等有此非因明所說自相譬如無瓶是為滅無然與地基可同處所而不須破滅無有事二者相違如是內識雖分別依處分是遍計執非勝義有然彼內識是勝義有亦不相違故以彼彼諸名等雖是聲聞部經然與彼釋非無差別如大衆部經所說根本識此宗則為阿賴耶識若執前說增益自性差別或自相有或勝義有即是正所知障如彼所執決擇非有即所知障清淨所緣實應正理由此諸理云何悟入唯識義耶謂若破諸法從色乃至一切種智名言處所分別所依是勝義有則執能詮之名所詮之義及依名義所詮自性差別之意言知如所現其義非有故其能取無不迷亂由此便能悟入唯識無能所取攝大乘論云以諸菩薩如是如實為入唯識勤修加行即於似文似義意言推求文名唯是意言推求依此文名之義亦唯意言推求名義自性差別唯是假立若時證得唯是意言爾時證知若名若義自性差別皆是假立自性差別義相無故同不可得由四尋思及由四種如實遍智於此似文似義意言便能悟入唯有識性若謂此是觀待分別意識破能所取非以正理觀待堅固習氣所起無分別識破能所取云何便能悟入唯識答云無過謂所取青是執外境分別依處由以正理破彼自相便能成立見青是分別依處之取青識於境迷亂以彼見似有自相故若彼已成則彼青色離似自識非有實物亦得善成若爾正理破除內識分別依處是勝義有則應成立似彼自證於境迷亂以彼見似有自相故若此亦成則於彼識自領納體應無自相是則棄捨瑜伽師宗答無彼過以自證分不見內識為分別所依其取青識則見青色為執外境所依處故以分別依處於離二取自證等前不可顯現於有二取執青識前則可顯現無相違故現似分別依處要有現似二取之理謂以彼總相於分別現時定須現為二取相故識則不同此於分別現總相時唯能現為領納相故又不應說於分別前定現二相故是相等以於分別現有二相與現彼境自有二相義不同故若不爾者應許分別定不顯現無二相事然不應理無二相事應非有故若謂青是分別所依唯由分別增上安立於離分別則皆不現幻相象馬於離分別應不顯現唯由分別所安立故是故解深密經宣說假立自性差別遍計執空是圓成實其中亦非不破異體能取所取彼經於奢摩他時明破外境故遍計執中一切共相及虛空等總有多種解深密經皆未說者以是由何遍計執空立為圓成實時彼非所須故又彼多種雖非名言所能安立然亦非由自相安立唯是分別所施設故觀外破除能取所取攝大乘論說如夢影等理二十論說破無方分微塵道理法稱論師說破能所取相相似而生之理陳那菩薩說破和合及極微塵是所取道理攝大乘論釋般若經凡云無者一切皆破遍計所執若未了知解深密經破遍計所執道理則唯說為異體能取所取遍計所執故於瑜伽自宗亦須說有無量不應理事又說常無常等全無著處則以此宗極難解釋是故有說全無著處依根本定說辨別此是此非有著處者依後得時說者是辨說窮竭菩薩地攝大乘論集論等中說四尋思四如實智是為決擇唯識正見悟入唯識最勝之門亦是煩惱根本分別及所知障之對治欲知彼義須善了知解深密經破遍計所執之理及最微細所破增益尤須了知以彼正理破除異體能取所取悟入唯識然見尚無能觀察者故為諸具慧略示觀察之門己二斷諍解深密經說由於依他起執著遍計所執自性起諸煩惱由彼作業流轉生死若於依他起見遍計所執相無自性彼等即得次第還滅聲聞獨覺菩薩三乘皆由此道此行迹故而得涅槃皆共此一妙清淨道皆同此一究竟清淨更無第二依他起上遍計執空除前所引亦未說餘是故聲聞獨覺證法無我是否此經之義若云是者前謂不共則成相違若云不是則此經義當如何釋菩薩地亦說由自性分別差別分別總執分別能生戲論所依分別所緣事彼為所依止而生薩迦耶見及以彼見生諸煩惱流轉生死由四尋思四如實智了知分別所取義無彼等即滅由是因緣是許於諸法上假立自性差別執自相有法我妄執是薩迦耶見之根本其法我執作補特伽羅我執所依者即許聲聞獨覺不證法無我之中觀師亦復共許其中若能盡法我執補特伽羅我執亦必隨滅然未能盡法我執者補特伽羅我執非不可滅故雖未滅生死究竟根本然脫離生死亦不相違是故經言由此道者雖是通達依他起上遍計所執相空之道然非定須法無我道以於依他起遍計所執空中集論說有依於補特伽羅無我而立故由通達補特伽羅無我淨諸煩惱於斷煩惱解脫之中大乘小乘全無差別故云共一妙清淨道同一清淨解深密經釋大乘經義謂諸蘊等是依他起於彼等上增益法我是遍計執彼由此空立法無我圓成實性由此當知五蘊依他起由補特伽羅我遍計所執空是補特伽羅無我圓成實性如是三性建立即是小乘經義是故初轉法輪所化之機是堪通達補特伽羅無我相無自性之器非堪通達法無我相無自性之器亦是解深密經所兼解釋說善辨法輪普為發趣一切乘者亦即此義若於假立自性差別及異體能所取遍計所執空時皆以依他起性為空依處彼由前二故空立圓成實者世親三經除害論云其中眼者謂法性眼言以眼者謂以遍計及分別眼所言空者是離之增語如是耳以耳空等皆當了知此說圓成實性為空依處由其所餘二自性空復云何通答若瑜伽師及中觀師任於何宗決擇法無我圓成實時當以何為空依處者要觀法我執為於何事執為法我譬如執繩為蛇恐怖憂苦若欲除苦應須以繩為空依處顯示彼繩由蛇而空不可以繩蛇空作空依處再說彼上空無所餘實繩實蛇又法我執唯由宗派熏心立者如執實有無方分極微與彼和合所取外事及無前後時分剎那與彼相續恆轉內識唯於彼宗諸人方有所餘有情一切皆無若唯顯示無彼之空於無始來相續隨轉俱生我執全無損害故須顯示俱生我執為於何事妄執為我即明彼事如其所執其我是空應知破除惡宗假立亦即屬於破此支分由是因緣當如通常諸有情類於見聞等義及眼色等內外諸事依他起上妄執為我即當以此為空依處決擇其空非於圓成實上執有真實餘二自性而起迷亂豈是決擇圓成實性由其所餘二自性空而為無我又執有法我非執有他實事如執某處有火以自內心是見外境內心似各別有如其所見便執為實其能對治謂當顯示所見心境無有異體能取所取非說無餘能取所取故辨中邊論釋云非如寺中空無苾芻是如繩體空非是蛇法我空理應知亦爾莫如世說鬼祟東門俑送西門當觀我執所依依他起性彼所執我遍計執空即圓成實修此空性能治我執除此法外修習餘空則於我執全無損害除害論所說謂分別心似能詮總名所詮總義名遍計眼見似能取色處為體性之眼名分別眼由離能詮總名所詮總義不可言說及離眼上別現二取自內證根本智所了圓成實性名法性眼其眼法性是根本聖智親所證義遠離能詮所詮能取所取二相由餘二性說根本智境界為空以前二相是遍計執以後二相是分別故即彼論云其所詮能詮之眼事是遍計眼能取所取體性之眼相是分別眼即彼遠離能所詮相不可言說離諸現相唯自內證圓成實性是法性眼又云若汝作意修勝義時諸行相事皆不得現故當知彼於勝義無於世俗有此說聖根本智義無二相故非說決擇因位正見法無我性圓成實之理又除害論雖於略有聖根本智義說為勝義有然許根本智證真實者一切皆許有其義境故彼豈是諍勝義有無之勝義有以觀察真實正理思擇所得之勝義有非彼所許彼於空空及勝義空無為空時於如是許廣分別破即可知故因恐文繁故茲不録般若經中從色乃至一切種智於一一法皆立三相謂空依處名分別所破名遍計此空法性名圓成實是故須說其分別眼由遍計眼空名法性眼若說根本智義出前二性空後一性為經義者未見善哉又此論中說聲聞人八種分別指如釋論二萬釋論解脫軍造即有彼文又破依他起及圓成實堪忍觀察真實正理所觀察故又與世親釋正理論如解深密經釋般若經所有密意極不符合故非世親所造如諸古書說是牙軍所造當是彼造丁三由此分辨諸經了不了義無著兄弟解釋諸法真實之理既如上說初轉法輪依有外境說有能取所取解為未了義其意趣所依如二十論云識從自種生似境相而轉為成內外處故佛說為二為何而說即彼論云依彼所化生世尊密意趣說為色等處如化生有情說從內外處生觀色等識者為令通達除彼等外無見者等故如言執義所有違害即破外境諸理增益諸法自性差別遍計所執即是法界法處故於彼二未加分別說有自相亦非了義集論中說方廣分說一切諸法皆無自性依三無性密意而說攝大乘論說方廣分中凡說無所有一切皆說遍計所執凡說如幻等喻皆說依他起凡說四清淨皆說圓成實其所說經即是般若故說第二法輪是未了義即指般若一類之經解釋正理論於般若等經說無自性等破如言執義解深密經說凡說一切法皆無自性此等皆非了義故許般若經是第二法輪此不了義與初法輪說能所取是不了義之理極不相同以內眼識從自親種異熟習氣成熟而生於此種子及彼現相密意說有眼處色處此意趣義不可說為諸小乘經所詮正義依三無性密意宣說為無自性則可說是般若經義故又有外處可以說是小乘經義若未分別無自性理說於勝義全無自性不可說是般若經義故故非釋云彼無分別說一切法於勝義中皆無自性雖是般若經義然非了義謂當釋云不可如言而取彼義唯於彼文義猶未定尚須解釋故非了義其解釋法謂遍計所執諸法由其自相不成實故名為勝義無自性依他起諸法由於清淨所緣不成實故名為勝義無自性圓成實諸法由是勝義亦是諸法無我性故名為勝義無自性故不許如言取義者為般若經所化之機其所化機能達彼經之義如解深密經所釋故後二法輪意趣相同又於方廣雖能信解若如言執義謂彼經義是如言義皆須破除謂彼經義非如言義解深密經明了解釋故是了義其般若經則於彼義未明分別不可如言而取其義故非了義如言取義所有妨難謂若如言取義則執三相皆無自相成損減失如前已說解釋正理論云般若波羅密多經說一切諸法皆無自性如是等類已多宣說此經又說欲入菩薩無過失者乃至亦說悔除一切諸惡罪等次云若無自性等文是如言義則此一切皆成相違以諸所取皆非有故從如是因感如是果如是所取皆不得成又如是所取為取何事欲何所取由是因緣於彼諸文不應定執為如言義若爾云何為密意語此顯若無自性等是如言義有相違過相違之理謂若無自性而為證得如是如是事應當勤學般若說有所取與欲得欲及說布施感大財位等因果皆不應理此中主要謂依他起不應道理又云許般若經是了義者亦說彼等唯由世間名言而立非由勝義謂於取捨及因果等如已數說非是總許全無自性或名言無經中雖未一一宣說然己總說若許勝義無是如言義此則破其因果等事皆不得成菩薩地及決擇分亦說若於勝義一切不成是損減邊已破除故凡依勝義所說經典分其了不了義要觀如言有無正理而為違害若善了知破勝義有復善了知即於如是所破事上以量安立繫縛解脫等則於此宗所說妨難皆能答覆若不爾者謂若芽生由量成立即勝義生唯由亂識覺其為生故於世俗彼等一切皆悉應理此說不能斷彼妨難則依瑜伽諸師解釋反為端嚴解不了義雖有多門然瑜伽師解第二法輪是不了義者唯應如是諸具慧者應當了知解深密經說三法輪非以弟子集會及大師年歲等安立是以所詮復是依於決擇無我義立謂初一類於婆羅痆斯說補特伽羅無我唯除蘊等少數法外未破實有多說實有次一類法未詳分別總破蘊等一切諸法為真實有後一類法別別分說第一自性是無自相餘二自性是有自相是依此理而為安立離此所說宣說餘義諸經非此觀察了不了義所依之處般若波羅蜜多教授論云若有經義是如言義則彼經典唯真了義以彼義中無第二義即彼之義決定唯爾故名了義為以何經決定其義有出自定有由他定有由俱定第一許為楞伽經及解深密經等意謂彼等顯了分別有無自性第二許為八千頌等意謂彼中未如解深密經分別有無自性第三許為二萬頌等意謂此中彌勒問品破除顛倒如言執義釋不了義解深密經亦解釋彼為不了義以第二經無彌勒問品故若如是者則許彌勒問品建立三相與解深密經所說義同若彼二義同雖為應理然世親菩薩於般若說無自性等引解深密經等諸餘經典成非了義顯示於般若經如言執義前後相違未引彌勒問品成立故非無著兄弟意趣然此二相似極難分別若彼二義同則一切諸法勝義無性唯名言有不可釋為般若經中密意之義當如唯識而釋亦是最大應觀擇處於中觀時更當廣說附録若於諸法諸事隨起言說即於彼法彼事有自性者如是一法一事應有衆多自性何以故以於一法一事制立衆多假說而詮表故亦非衆多假說詮表決定可得謂隨一假說於彼法彼事有體有分有其自性非餘假說是故一切假說若具不具於一切法於一切事皆非有體有分有其自性又如前說色等諸法若隨假說有自性者要先有事然後隨欲制立假說先未制立彼假說時彼法彼事應無自性若無自性無事制立假說詮表不應道理假說詮表既無所有彼法彼事隨其假說而有自性不應道理又若諸色未立假說詮表以前先有色性後依色悵制立假說攝取色者是則離色假說詮表於色想法於色想事應起色覺而實不起由此因緣由此道理當知諸法離言自性如說其色如是受等如前所說乃至涅槃應知亦爾瑜伽三十六菩薩地若謂諸相自性安立即稱其量假立名言此假名言依相而立是則於相假立名前應有彼覺如已立名又於一相所立名言有衆多故有差別故應有衆多差別體性是故名言依相而立不應道理若謂諸相如名安立由名勢立相自性起是則彼相假立名前應無自性彼既無有假立名言亦應無有是故二種俱成無過又假名言有衆多故有差別故應有衆多差別體性又依他過由彼諸相但依於他假立故是故一切假立名言如其自性不應道理瑜伽七十三決擇分
