body:
  text: 丁二應成中觀師如何解釋聖者諸論分二戊初如何解說人法有無自性戊二顯示破勝義有以何正理而為上首初中分三己初說破人法自性之差別己二明此是釋聖者意趣不共之理己三斷除此理與經相違初中分二庚初明破自相之性是其差別庚二明所破已顯示彼無今初佛護論師造中論釋清辯於彼雖出眾過然未宣說二無我義有所不同觀音禁亦云於名言中了知內外緣起如幻能作所作於勝義中知無自性即聖父子清辯佛護等宣說中道諸師顯示般若波羅蜜多之理此說名言幻有勝義無性二師相同智藏靜命蓮華戒等亦未宣說佛護月稱宗與自宗中無我有別月稱論師則許佛護如實解釋聖者意趣與自建立勝義世俗理無差別然說自宗不共餘中觀師所釋入中論釋云如除中論餘論解此空性法時無不倒說如是智者定當了知我等此宗所說諸法及答諸難如空性法非他論有故有說云經部宗師說為勝義即中觀師許為世俗當知此說全未了知中論真實於婆沙宗亦如是說其後又云以出世法等同世法不應理故故諸智者當知此宗是不共法此以自宗不共餘中觀師為因若說下二部所說勝義許為中觀世俗法者安立彼尚未解中觀真實此中理由謂自宗中雖於名言亦不許有自相法故以彼皆是從自相上而安立故於二諦中隨失其一亦失餘一不壞二諦出世間法與壞二諦世間之法隨在二諦何諦相同皆不應理故聖者此宗非僅勝義即在世俗與實事宗亦不相共二諦論自釋引頌云餘所許勝義即他許世俗如餘許為母亦許為他妻疏雖說為龍猛所造然依入中論釋即知其非其疏造者傳是靜命或是同名或是附借然非製造中觀莊嚴等論者以此說造論所為時破攝量真實疏故二諦論自釋說能取所取如其顯現若謂全無既違現量亦違世間疏解此義為應理故又入中論釋出他難云由勝義無生故破自他生然色受等現比所得此等自性定從他生若不許此何說二諦應唯一諦故有他生此是上文破自相因果時謂於勝義破彼而破他生雖應道理然於名言有自性生或自相生須許他生若不許此則於世俗亦無諦實應無世諦為答此難於二諦中如次成立無自相生此是對許勝義無生及於名言有自相生之中觀師而為成立非對實事諸師中觀二師既有如是所破差別故不應說月稱論師何故於彼特別破斥庚二明所破已顯示彼無分二辛初明分別俱生增益所執顯示彼無辛二依聲聞藏解釋佛說二無我義今初若爾如何執著是執自相有耶此當敘說諸宗所許謂如云此補特伽羅造如是業受如是果立假名時彼必追求補特伽羅假名之義為即自蘊是補特伽羅耶抑離諸蘊別有義耶若於一異義等隨得一品而為補特伽羅安立之處乃能安立造業者等若無所得即不能立是故若覺補特伽羅唯假立名猶不滿足而更觀察尋求彼名假施設處為是何事乃可安立即是安立補特伽羅為自相有自部婆沙乃至中觀自續諸師皆如是許如是安立色受等有為無為一切諸法下至經部於遣質碍唯無遮上安立虛空凡是許為以量成立立為有者皆須尋求各各名言所詮之義為如何有尋求之義若無所得即便不能安立為有與彼相違乃立為有因明論中唯有作為說名自相對法經等如火熱性表不共他說名自相與此由自相有所說自相極不相同月稱師宗由如是門所立之有雖於名言亦不許可自宗安立名言之理如顯句論云復次所依之身及所依頭其能別法依者碕鈷譯音依者羅睺皆是世間名言支分不觀察有猶如假立補特伽羅等皆可有故此喻非理此謂他云如世間說碕鈷之身羅睺之頭雖離身頭無異能別然就分別可有事所依之事法能依之法如是說堅為地自相雖離堅硬別無有地然亦可立如是言說次答彼云由說身頭遂起覺心緣取彼二為所別事次欲了知是誰之身誰之頭耶說者亦為遮遣非是碕鈷羅睺所有身頭隨順世間言說而說碕鈷羅睺為能別法除聽者疑可為應理然無有地非是堅硬而云堅性是地自相無有如上疑可除故法喻不同答後又說喻不成過其所別事所依身頭與能別法能依碕鈷及羅睺羅於世名言相異而有故說彼二為無異法喻不得成此中若求何為施設假名所依而無異義可得唯於羅睺之頭名羅睺故若求碕鈷與碕鈷身亦無異義可獲得故其論後文復設問答破彼執云設作是言僅見爾許然離身頭無餘異義故喻得成答云非爾世間名言無有如是觀察轉故世間諸事皆不觀察立為有故謂他諍云就聽者前雖有爾許事法然觀察彼名言義時離身頭外別無碕鈷羅睺可得故彼事法仍不得成此是前說他宗立有諸法之軌答云所言有者就世名言彼非如是觀察而立是無觀察而安立故若觀察立則不能立於不觀察安立之理論後又云猶如觀察則離色等別無異我然依諸蘊世間世俗許此是有羅睺碕鈷亦許如是故喻不成此說安立補特伽羅之理謂如說言天授之色天授之心若觀彼名所依天授及彼色心為如何有非彼諸法即是天授亦非離色心等有餘天授可得非有推求所得之義可立天授故云無我此乃無有自相天授非是天授都無所有以依諸蘊世俗有故前二譬喻亦如是立安立諸法之理論後又云如是觀察則離堅等別無地等異體所相離所相外亦無異體無依能相雖則如是然世俗有故諸論師唯依互相觀待門中安立為有此說安立地與堅等能所相時若復如前尋求能相所相名言所詮之事有所得義方安立者則皆不能立彼二相唯由互相觀待門中立彼為有定當受許如是安立人法之理並其因相論後又云此唯如是定當受許若不爾者豈非世俗亦具證成應真實有非世俗有若以證成道理觀察非僅無有碕鈷等法若爾云何謂以後說證成觀察色受等法亦無所有故亦當許彼等諸法如碕鈷等非世俗有然非如是故此非有此說依緣假立之理當知猶如入中論說若於如前觀察所得之義而安立者即是以觀察真實有無之理而為安立說彼應是勝義中有非世俗有故自相有即勝義有若爾如二諦論云如現即性故觀察不趣此若觀察有失其義成餘故中觀自續諸師豈非亦破以諸正理觀察所得立諸世俗故名言有不以正理觀察而立云何說為汝之特法如此諍問是未能辨中觀兩派如何觀察是觀真實有無之別應成派師如前觀察即許是觀真實有無前引諸論并數宣說凡有皆是唯名唯表唯言說故言唯名者謂名言義如前尋求皆不可得非說有名而全無義亦非說無非名之義此雖非許凡由施設名言之心所立一切皆名言有然未由其立名言心增上而立則定不許為名言有中觀自續諸師唯名言心增上之力不能安立色受等法要於無損根識等前顯現增上乃可立為名言中有故由心增上安不安立其心亦有最大差別若非由如是心增上而立觀察諸法由其自體增上有無等乃為觀察真實有無唯以前說觀察之理則非所許故名言中許有自相故於經說唯世俗名唯有表示唯是假立唯字所遣亦不相同若爾世間亦有眾多觀察如來未來生未生等答如是問豈不可說來與生耶如此尋求觀察道理與前不同此非於往來作者及往來名言唯以如是假名安立而不滿足更求施設彼名之義而問往來是於尋常往來名言而作尋常觀擇許此觀察有何相違如是觀察名言諸義執有自相之性者非是俱生我執執著之相於生死中縛有情者是俱生執須以正理正破彼執云何是彼執著之相謂執著內外諸法非為名言增上而立由自體有若於祠授等補特伽羅起如是執是為補特伽羅我執若於眼耳等法起如是執是法我執由此亦當了知二我如是我執雖非觀察名言之義而起執著然如此執其境若有觀彼名言所施設處為如何有能觀察智須有所得故無分別俱生我執及彼境界是為正理正所應破與諸餘論說觀察破亦不相違故不應執唯破分別我執及境未受邪宗熏染有情及不善解名言有情雖未能知非由施設名言之心增上而立實有之名然有其義若不爾者二我執義亦應非有諸瑜伽師及中觀宗自續諸師於人法上由遣何事立為無我所說二我及執著相義雖不同然在此宗由有法事分二無我所無之我不許不同入中論云為度眾生說無我由人法別分為二此由人法差別而分未說由其二我而別四百論釋亦云所言我者謂即諸法不依他性無彼自性說名無我此由人法差別為二謂法無我及人無我不依他性者謂非唯名假立由義自體而有即自然性若謂自部下自婆沙乃至中觀自續諸師凡許由量所立之義即許是由自相而有前說諸瑜伽師於許假立色等自性差別徧計所執為實有者破自相有而許假名安立為有即犯相違答云無過彼是由其假名安立說無自相然彼非許尋求自名所依設事為無所得故有此宗所說有自相執彼等書中說假安立自性差別唯假名者亦是彼二於心顯現如現異體能取所取無如是義許為假有故與此宗唯名假立極不相同辛二依聲聞藏解釋佛說二無我義諸瑜伽師及中觀宗自續諸師謂小乘藏中未說法無我大乘所說補特伽羅無我較聲聞部之所決擇亦無過上此二師宗違彼而說初聲聞藏中說法無我之理如佛護云世尊宣說諸行無我譬如幻事谷響影像陽燄夢沫水泡芭蕉此中全無真如或無謬真如皆是戲論皆是虛妄又說一切法悉皆無我言無我者謂無自性義以言我之名即自性句故此說五蘊無我之喻如其次第如水沫水泡芭蕉陽燄幻事又云此等皆是虛妄又聲聞藏說一切法皆無我者明一切法皆無自性以我之義即自性義故入中論釋引聲聞乘經云色蘊同沫聚等說法無我六十正理論釋亦說遣除無見聲聞部中亦極顯了故今不說彼理遣除有見唯一勝諦謂般涅槃無欺誑法彼雖亦說一切諸行皆是虛妄法等然未數數無間一處而說故說彼正理清辯論師於此破云彼諸喻者明似人我而實非有是人無我非法無我我之名義非法自性是補特伽羅我若聲聞乘說法無我則大乘法便成無義入中論釋云大乘法中非唯顯示法無我義亦說諸地波羅蜜多及諸大願二資糧等故非無義并引寶鬘論證月稱謂此亦是論師所許引中論云世尊由證知有事無事法迦旃延那經雙破於有無又云若法性欺誑世尊說為妄諸行欺誑法故彼皆虛妄而為證成六十正理論云若諸佛宣說唯涅槃諦實爾時諸智者誰說餘非倒謂於性空無自性義若作餘解以虛妄義為出過難用中論文成立彼義而為決定故聲聞藏說法無我定當許為聖者意趣雖則如是然不能成聲聞藏中未說諸法有自相性亦有多處作是說故補特伽羅無我者自部大小乘諸餘宗謂補特伽羅無異蘊相自立實體許為無我其中道理謂我執之事我如蘊主蘊如我僕云我之色我之受等即執諸蘊是我所有我主宰故猶如主僕現似自立異於蘊相若執如是而有即執實有若能破彼則補特伽羅唯於蘊假立唯字遣除有離蘊我假立之理如分別熾然論云我等於名言中亦於識上設立我名謂識是我取後有故又說於身及諸根上亦假立故次引經說如依支聚假立名車如是依蘊設立有情又引教證如有經說若伏其心便得安樂亦有經說由調伏我當得善趣其能立理謂能取蘊者即說為我識取後有故立識為我此師不許阿賴耶識故取身之識許是意識餘師不許阿賴耶者亦與此同許阿賴耶者則以賴耶相續為補特伽羅彼等如是許補特伽羅我之教文恐繁不錄月稱宗說雖破如是實有補特伽羅然未能破補特伽羅非唯名言假立由自體有若執有此即是補特伽羅我執以執補特伽羅是諦實故如法我執又能自主實有之我乃是外道徧計別有內身離蘊作者士夫邪執之境縱證無彼見後修習然於色等如前執實不能稍減由執諸蘊諦實所起貪等煩惱亦不能滅入中論云汝見無我諸瑜伽不能通達色等性緣色仍當起貪等以未通達彼性故六十正理論釋亦云若見色等有實自性彼等雖欲斷諸煩惱然彼煩惱定不能斷為顯此故頌云諸心有所住惑毒豈不生若時雖處中亦被惑蛇咬言所住者謂有自相起實執之境餘師安立補特伽羅假有之理亦非聲聞藏中如依諸支聚假名說為車如是依諸蘊說世俗有情所說之義以依諸支所立之車即非其支如是依蘊假立補特伽羅亦非蘊故若謂如依支聚假立名車唯彼支聚即是其車蘊亦應爾若依彼假立應許非所依事如大種為因假立青色及眼根等瓶等亦與我同故彼等亦無不定過入中論云經說依蘊立故蘊聚非我若謂經說若諸沙門婆羅門等見有我者唯見五蘊此說蘊是我見所緣由是當許蘊等是我答此非成立蘊是我見所緣唯字僅遮離蘊別有我見所緣以餘經說色非我等於一一蘊破是我故入中論云由佛說蘊我故許蘊是我彼遣離蘊我餘說色非我薩迦耶見之名義即以此文亦當了知此等是明俱生我執共有所緣行相二境其所緣境於名言有其行相境謂執彼我為自性有即是執我由自相成此於名言亦無所有俱生薩迦耶見我所執之所緣謂我所事行相謂執我所是自相有設作是難若謂諸蘊非是俱生我執所緣則經破云色等非是我亦不應理以彼非是俱生我執薩迦耶見境或事故答執蘊與我若一若異俱是分別我執非俱生執故無彼過然如俱生薩迦耶見所執若有亦必不能超出一異故作如是觀察而破亦應正理此等顯示有能立教而無違難次出正理謂諸蘊等是我所取我是能取則識或餘蘊理皆非我若不爾者作者與業應成一故此亦即是菩薩意趣如中論云若柴即是火作者業應一又云由火與柴理我與所取事瓶衣等一切無餘盡當說中論又云取如是應知此說業與作者互依假有非自性有取與取者亦如是立譬如由眼見色能善立云祠授見色由祠授觀色能善安立云眼觀色然亦不違見色之眼非是祠授觀色祠授亦非是眼如是眼痛眼愈雖能立名我痛我愈亦能立名我眼痛愈然非由世名言安立彼眼為我我所由此道理我與所餘內外諸處互相依托立聞者等亦當了知入中論釋說外道由見眼等諸法不可立為補特伽羅故許離彼別有實體能見者等補特伽羅自部餘宗由於異體見有過難故許識蘊或餘蘊法為補特伽羅諸能無倒解佛語者通達唯有名言假立別無自性便當解脫此須唯於假有即善安立造業及受果等故補特伽羅無我者如入中論本釋決擇經說如依諸支聚等所有意趣七相尋求補特伽羅名言之義於無所得無自性義許為無我故與他說有大差別此亦即是佛護釋中根本意趣己二明此是釋聖者意趣不共之理分三庚初說證無我與粗細我執等不共差別庚二安立外境不許阿賴耶及自證分不共差別庚三不許自續不共差別今初如是尋求我法名言之義於一異等無少可得然云祠授及云眼等此諸名言定須安立故無不由名言增上所立之自性名言增上安立有中生死涅槃一切建立亦極應理如是建立二諦即是佛護月稱論師解聖父子所有意趣超出餘釋無上勝法名言所有及生滅等皆由名言增上如是安立如正攝法經云善男子世間由耽著生滅而住大悲如來為斷世間恐怖處故由名言增上說生說滅善男子然於此中無少法生七十空性論云佛由世名力說住或生滅有無劣等勝非真增上說如般若經等亦說世間名言中有故中觀師須於名言安立世間名言雖亦安立從諸種子生苗芽等然非尋求彼名言義為從自生或他生等是無觀察而立聖者亦唯作如是說故世間名言無觀察者義如前說此宗安立補特伽羅之理以於離蘊別體及於唯蘊聚等安立補特伽羅定非世間名言義故世間安立我及我所如主僕故補特伽羅及法於勝義無及世俗有理皆如是二無我義亦如此說若有宗派許有法我亦無通達補特伽羅無我之處入中論釋云若於法上未捨我執亦不能達補特伽羅無我故聲聞獨覺亦須通達二種無我此即聖者最勝所許六十正理論云有不得解脫無不出此有徧知有無事大士當解脫此說若執諸法由自相有是為有見見因果等皆悉不成是為無見乃至未捨二見不得解脫由知有事無事真實遠離二邊當解脫故言解脫者不能說是解所知障此說不出此有故如是寶鬘論亦云世間如陽燄謂有或謂無此執即愚癡有愚不解脫有見往善趣無見墮惡道徧知真實故不依二解脫此說解脫生死俱須遠離有無二邊故如大乘中有破異體能取所取說法無我於二空識未破自性及有於彼亦破自性說法無我粗細二種後為了義如是聲聞藏中亦說粗細二種補特伽羅無我當許微細無我是為了義理相等故由是因緣安立我執為二障之理亦有不同餘中觀師立法我執為所知障此宗許為煩惱障故如佛護云由見有情為種種苦之所逼惱為解救故欲如實說諸法真義故造本慧中論名其真實義即無自性由愚癡闇障蔽慧眼遂於諸法分別自性而生貪瞋若時了知緣起發生光明破除癡闇觀見諸法悉無自性無依處故貪瞋不起為證彼義引百論云識即三有種諸境識所行若見境無我三有種當滅此說貪瞋所對之癡即實事執及三有種要滅此執須見無我又說即見諸法無性故許執有諦實人法即染污無明百論釋亦云由識增益諸法自性染污無知增上力故遂於諸法妄起貪著而成流轉生死種子由彼一切畢竟滅故即便立為生死還滅入中論釋亦云諸法無性無明增益於見自性障蔽為體說名世俗又云由是因緣有支所攝染污無明增上力故立世俗諦此顯然說執法實有即十二支中初支染污無明此俱生無明中有人法二種我執其俱生人我執亦是染污無明故有時說無明為生死根本有時亦說俱生薩迦耶見為本俱不相違俱生我執之所緣即是執我之事若執他身補特伽羅為自性有雖是補特伽羅我執然非薩迦耶見此理亦是聖者父子最勝所許如七十空性論云因緣生諸法若計為真實佛說是無明彼起十二支此說由知諸法自性本空能滅無明從此亦滅十二有支由前同類無明而生後支故有十二百論亦云如身根徧身癡徧住一切故一切煩惱由癡滅皆滅若見諸緣起愚癡則不生故盡一切力唯當宣此語此說滅三毒中之無明須見緣起緣起義者即性空義此宗亦曾多次宣說是故一切中觀道理皆是破除生死根本無明行相之支當知自身俱生無明如何執著精勤斷除不應專好與諸宗派巧於諍論若爾人法俱生我執無有二種不隨順相諸自續師所說彼等為是何執其執補特伽羅不順蘊相自立實有者是執離於手足等法別有實體補特伽羅未由邪宗染污心者即無彼執如入中論云何故世人唯下種便云此子由我生亦覺此樹是我栽故世亦無從他生佛護亦云唯下樹種待樹生時便指樹曰此是我栽不執彼二為有異體若不爾者應指所生柏樹而云我栽樺樹以如是理例可說云何故世人手痛時而覺我痛故彼二世間亦非有異體此等非唯世間作如是說須如是許若由所栽種與所痛手非是彼樹及補特伽羅而不能立為栽彼樹及補特伽羅痛者則彼二法成無所有一切建立皆當失壞由此道理當知自續所說俱生法我執唯是分別若爾何為所知障耶入中論釋云無明習氣能障決了所知貪等習氣亦是身語如是轉因以彼無明貪等習氣亦唯成佛一切種智乃能滅除非餘能滅此宗諸教及聖父子無諍論中未有較此更顯然者言身語轉者謂阿羅漢有身語粗重如猿猴躍呼他為婢大師雖遮終不能斷言亦是者顯貪等習氣亦能障礙決了所知故一切煩惱習氣皆是所知障其果現似二取相等一切亂分亦是彼攝習氣自體如入中論釋云若法於心熏染隨逐說名習氣煩惱邊際薰習根本習氣是諸異名斷除此所知障雖除前說通達真實之道外更無有餘然方便支有具不具時有久遠修未修習故大小乘有斷差別由諸經中明二我執及二無我粗細差別說有多種二種我執既有不同故見無我能脫何障亦有多種不同之理此等了不了義之別由前所說亦當了知不許阿賴耶者其習氣建立與住相體性最難了解雖應解說然少則難決多恐繁累故不開說由於人法如何安立二諦之理有所不同彼二無我亦有不同故大小乘證不證彼及二我執二種障等皆不同餘宗為此特法庚二安立外境不許阿賴耶及自證分不共差別安立諸法及補特伽羅之理既如前說故於名言不能判別有預流等補特伽羅無地獄等補特伽羅以於勝義二者俱無於名言中二俱有故如是蘊界處法亦不能判謂無色法有心心所以於二諦有無等故餘中觀師有說外境與識俱有有中觀師及唯識師說唯有識而無外境然彼一切凡說為有即有自相若無自相即說為無此宗雖許外境無有自相然不於彼說無外境故不相同故任何法若能了知雖無自相而立為有即能善解不可分判境識有無之理若不知彼即不能解故破極微無有方分由無彼故亦無由彼集合粗色粗細俱無故無外境百論釋說此等道理雖能破除無分外境然不能破外境為有聖教世間俱能於彼作妨難故十地經說三界唯心唯字簡彼非是經義經自明說破離心外世間作者與清辯同經說外境悉非有等月稱非同清辯師說此經非破外境而釋彼經雖破外境然非了義故不說十地經是不了義而破彼云非是經義於楞伽經則不說彼非是經義而云彼經是不了義般若經中宣說五蘊皆自性空無有差別對法則說五蘊皆有自相共相應如是許意以識與境若觀名言假立之義俱不可得若判彼法有無差別既違世間名言亦違勝義建立故於二諦俱為失壞如百論云說一有一無非真非世間故不可宣說此有彼非有此亦即是聖者意趣又云宣說大種等皆是識所攝等者義如釋論中說謂色心心所不相應行皆由能緣自識安立行相而立大種等未立行相不能安立有少法故故大種等是識所攝以唯由識所安立故若時現證識梵無自性生爾時由識所立種種皆當滅離猶如形滅影像亦滅故彼論文非破外境又不許阿賴耶識亦無過咎謂業感異熟須經長時然第二剎那其業即滅從已滅法不能生果故許阿賴耶識為業果所依然無自相能立有事安立已滅為有事法亦極應理故不須許阿賴耶識入中論云由許非滅自性有故無賴耶能有此有業雖滅已經久當知猶能生自果若於世俗亦破自相而能安立無性因果非但雙於二諦易除常斷二見即不許阿賴耶識亦能安立業果繫屬入中論釋云是故如是於二諦中俱無自性非但遠離常斷二見諸業已滅雖經久時與諸業果而相繫屬不須妄計阿賴耶識相續及不壞得等亦皆應理言是故者謂承前說從無自性生無自性不許阿賴耶識雖亦須釋最後死心及初生心不成等難月稱意謂由知此理餘亦易了故未解說今恐文繁茲亦不述由許外境故亦不立阿賴耶識若許彼識則亦須許辨中邊論識生變似義有情我及了此境實非有境無故識無所說義故成立已滅為有事之理是顯句論及六十正理論釋所說中論疏中茲當廣說由許滅為有事故立三世亦有最大不共差別許自證者及破自證入中論本釋作如是說先未領納必不生念故念唯從領納而生如云先曾見此是追念境若云我見是念有境故先緣青色之識亦有領納此復若是餘識領納則彼仍須餘識領納便成無窮若謂前識是後領納則彼後識應不能決餘色等境故須自領以領納中二決定故故由後念成立領納前境自證此中若依實有增上彼念非有等同所立若依名言增上則自證分他不極成自證是後陳法彼與後念不成因果如以有水火成立定有水晶火晶與由有念成有自證二者相等此是以果為因就以自證為所立法而破若如是立即無同喻若立量云能取青識有能領納以於後時有能念故喻如青色此喻雖有因法隨轉然不決定此亦等同以自證分為所立法僅未明說若以唯立有能領納是已極成故未直說與彼相等自宗雖無自證然有念生而無相違如云由何領境離彼外我不說有餘念法故起念云是我見此亦隨世名言規前說執著若無自證生念相違之理非以此遣此說依於生念之理即壞執前為自證分謂彼難云前見青色後生念時云我先見即前所見憶為我見若非前取青識自領納自如是憶念應成相違故前領納即自證分答此念非由自證力生是由前領青境與後生念同於一境轉趣之力故生念云謂我先見為成前取青識所領所決非後取青之念不領不決故云如我所許領納與念非自相異故唯如汝理則慈氏所領近護亦應憶念故此二法若如他宗有異實體則俱生心應執為異如是於前青識所見後念不應執為已見領念二心一境相違故生念云是我先見亦成相違若如我許彼二非實異體其俱生心亦無彼執故前所決境念為我決亦不相違此即由前領納牽引之力而於境轉無自然力而決斷境故起彼念非有餘緣故於名言不許自證亦由名言破除自相是究竟理又領納中雖未明說自領他領二品之中決不決斷然意趣謂不能決斷如不許燈自能明自而許是明故自明他明二不決斷若謂燈不自明而無量不成過識不自知則量不成故不同燈他若難云燈不自明不由他明其明不成復無餘量而能成立故量不成當有何答雖俱不由自他而明能照瓶等故明成立若爾識亦相等若謂知境須仗自證若無自證知境不成燈亦應爾若謂我等許燈自明此不應理無闇障故黑闇亦應自障蔽自若許爾者應不見闇總之由依所知假立為知非自相有所知亦然由是因緣非唯二名互相觀待其義亦唯互待而立是故不許有自證分迴諍論云若不待所量謂量由自成應汝所成量自成不待餘亦應了知破自證理若爾念云我昔見青其我即是補特伽羅緣青之識與彼相違如是念時云何是念緣青識耶緣青眼識與見青色補特伽羅二雖相違如依彼識見青而假立云我見青色無有相違如是依於憶緣青識見青謂我見青即此憶補特伽羅念為憶緣青識念何違之有庚三不許自續不共差別分二辛初破自續之漸次及明他派如何解說此義辛二自宗有立所立之因及無自續因之理今初諸經論義若如是解當許自續若如彼解則不可許此義雖是經中所有然就已譯自教諸論觀察自續應成當何所許及說自續非理應成符理者除月稱諸論及隨行者外皆未明說漸次者謂於佛護解釋諸法不自生頌義顯無清辯所出過時顯句論中說佛護師不許自續及成立中觀師不應用自續并許彼者有多過難開此車軌百論釋中破護法論師時亦略宣說破自續之理清辯論師未諳佛護許否自續與自不同是想定許自續為宗由是因緣故亦不許自與佛護破人法自性其所破事更有差別清辯後學觀音禁論師了知顯句論解釋般若燈中破佛護時應釋月稱說清辯過為轉不轉靜命師徒等亦應解救月稱破自續之過然皆未解說總以此二論師雖於名言亦破自相於無自性中因果等法一切建立皆極應理此復由許世出世間諸緣起故即以緣起為因破彼所破此說正理是諸理中深細究竟尤以破自續理最為微細此中有論師云若立所立因及決定由量成者自續之因則為應理然無彼事故自續宗不應道理此中若以立敵共許由量所成而為因者不應道理立者量成敵不知故以彼現比皆不能知他心差別故即自量成亦不能知自縱決斷有誤謬故此極非理若爾則就他許而破亦非道理他如何許非自知故以不能知他人心故自出過破亦不應理縱決為過有誤謬故其說決定非由量成之理謂現量僅見竈上有煙決定有火非能通達一切時處凡有煙者決定有火比量亦不能知一切時處凡有因上定有所立之法故唯以世間共許成其決定非由量成此亦極不應理倒執正理論中成立決定之理而妄破故以於竈上成立有煙決定有火者謂成立竈上有煙決定竈上有火非論義故若不爾者則於有煙之山應以竈有煙之因成立竈上有火以山有煙之因成立決定有火時凡為因者定為法所徧故成立之理如汝前說故故言竈者是凡有煙決定有火之事其決定者是於彼事所決之義若如汝許則彼決定謂於何事決定應當更說同喻有法如是以所作因成立聲無常時於瓶等上成立決定者豈是成立瓶之無常徧瓶所作未加時處簡別而云此處此時之煙及所作僅於有煙及所作成立決定有火與無常者即是徧於一切時處決定無誤之方便故於彼義不應倒執更有隨順此理許一類因者如被水漂而攀無根之草如是有破事力之理或於境義無謬之量而立世許無觀察量說破他之過於自不轉者謂自宗不許正理觀察他宗許故此是未解觀察世俗及勝義中有無之別亦未了解中觀兩派觀察真實有無之別亦未了知如前所說尋求名言假立之義皆無所得唯於假名立因果等故雖數說縱於名言亦無自相然亦唯有空言而已復有許云一切全無量所立義唯依他許或許究竟以能破理破其邪執唯破實有非立無實是為不許自續宗因之義復有說云凡依世俗勝義一切建立皆就他而說非自宗有即說此語亦唯就他非自樂說此非昔時破自續者之所有唯後人說更有一類反許此宗不共所破多數亦破量立緣起適成此宗上首敵者此等立破菩提道次第論中已廣說訖故不更開辛二自宗有立所立之因及無自續因之理分二壬初有立所立因之理壬二不許自續因之理今初自宗義謂若許自相如解深密經所說者則定須許自續之義譬如自部實事諸師及清辯等若於名言亦不許有自相之法則定不應許自續義此亦因為須破微細所破事故又此非是由見名言若無自相而立自宗能立所立能量所量有相違過故不許自續是如入中論本釋觀因生果為會不會設雙關破成立彼過唯於他轉釋論說云若如汝許能生所生是有自相則於汝義此觀察轉謂許因果有自相者則有雙關觀察過轉若許如幻無自性者則無彼過他於能破出相等過答云能破所破為會破抑未會破此過失若有宗者有斯過我無宗故無此失本論說彼二不同之理謂我無宗釋論則云能破所破俱無性故此說無宗為不許自相或自性之義與上觀因果不同之理同是一義入中論釋即於此處引舍利弗觀察而問須菩提云為以生法得無生得抑得生得答二俱不許次問為無得無證耶答云雖有此二然非由二相次說彼二及預流等皆就世間名言而立於勝義中無證無得釋中說云此中由犯二種過故破得生法無生法得然於無事彼二非理故是無觀察於世名言許得所得如是能破所破雖亦非是會不會破然於名言當知能破破其所破又云性空能破破其所破離諸證成性空正因立其所立此說一切能立能破皆如二位尊者問答而許其中得者是所得法觀察問得何所得時答俱不許問無得所得者是執觀察無得即是觀察破彼之義言雖有者謂理智未得非是遮破故說為有言非由二相者謂如觀察問生無生得如是二種俱無所得以下諸文謂二相觀察無所得者是勝義無不觀察者即名言有義此雖甚顯然觀未觀察之界限猶難了知故當善知如前所說四種觀察言於無事彼二非理者義謂若許是有自相或許非唯名言增上假立是實有者彼二觀察可為應理然於無事或無自性則彼觀察不應道理故顯句論亦破能量所量是有自性說是互相觀待而立迴諍論自釋亦說雖無自性然能成立所立並說譬喻總如論云若誰能有空彼一切得成謂如數說若於何宗空無自相之性生死涅槃一切建立皆悉應理若執正因成立所立及以能量量度所量能所作用不應理者唯顯自慧輕浮而已又迴諍論云若我有少宗我則有彼過此義是說若誰有宗彼即有過又云然我全無宗故我唯無過此義是說我無此宗故過非有此中言宗及所立者義如入中論釋所說是立有自相或有自性為宗百論云有無及二俱若誰無是宗雖長時於彼不能說過失謂由無宗故不可設過此如入中論釋云於假有中說此二邊不應道理以是之故依止二邊若破若答於中觀師一切畢竟不得過難此說於無觀察唯由名言增上所立假有之理觀察二邊終不可得能破之過以觀為得生或無生而與破難不應理故故此非是於無觀察名言之中不許能立所立之據顯句論中說中觀師不許自續之理由不許他宗故為證此義引前諸論此亦是證中觀論師不應許勝義有或許自相不應道理言不許彼或不應理者謂自續因不應道理是破自續非破成立所立之因所說二邊凡有三義謂說所破實有及破所破其破實有又說有自相及畢竟無又如前說生無生二
