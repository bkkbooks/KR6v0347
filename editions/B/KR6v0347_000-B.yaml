body:
  text: 甲一依止解深密經乙一列經所說丙一問經離相違丙二答離相違丁一釋無自性所有密意戊一略標戊二廣釋戊三顯喻丁二釋無生等所有密意丙三明三自性體丙四白彼結成義丁一引經丁二略釋經義戊一略釋經文義戊二略釋了不了義乙二解釋經義丙一無著論師正依解深密經丙二依於此經抉擇真實丁一總明離二邊戊一菩薩地所說己一見為增益損減己二破彼二見戊二抉擇分所說己一敘述敵宗問答彼義己二破其所答庚一顯他宗相違庚二明自宗無違戊三餘論所說己一莊嚴經論所說己二辨中邊論所說丁二別破增益邊戊一明所破增益戊二如何破彼之理己一正破己二斷諍丁三由此分辨諸經了不了義甲二依止無盡慧經乙一標經所說乙二解釋經義丙一龍猛菩薩如何解釋經義丁一釋緣起義即無性義丁二讚彼即是經心要義丙二彼諸弟子如何解釋丁一自續中觀師如何解釋聖者諸論戊一清辨論師如何解釋己一於勝義中如何解說人法有無自性己二於名言中如何解說有無外境己三顯示破勝義有以何正理而為上首戊二靜命父子如何解釋己一於勝義中如何解說人法有無自性己二於名言中如何解說有無外境己三如何解說解深密經義己四顯示破勝義有以何正理而為上首庚一明理所破庚二如何破除丁二應成中觀師如何解釋聖者諸論戊一如何解說人法有無自性己一說破人法自性之差別庚一明破自相之性是其差別庚二明所破已顯示彼無辛一明分別俱生增益所執顯示彼無辛二依聲聞藏解釋佛說二無我義己二明此是釋聖者意趣不共之理庚一說證無我與粗細我執等不共差別庚二安立外境不許阿賴耶及自證分不共差別庚三不許自續不共差別辛一破自續之漸次及明他派如何解說此義辛二自宗有立所立之因及無自續因之理壬一有立所立因之理壬二不許自續因之理己三斷除此理與經相違庚一斷除違背解深密經庚二顯彼不同彌勒問品戊二顯示破勝義有以何正理而為上首己一明正理上首己二以彼破自相之理己三破已無性是否所立
