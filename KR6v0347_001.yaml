body:
  text: 宗喀巴大師造法尊譯敬禮師長妙音樂生乘云及金胎無身主同繩腹等宣唱驕音於三有傲慢威嚴諸天衆尚由略瞻如來身猶如日光映螢火妙冠敬依足下蓮我禮能仁天中天智悲藏底難測度菩提行浪極湧漾善說寶藏妙音尊及紹聖海我敬禮善開佛語二車軌故令如來最勝教如日光顯遍三地敬禮龍猛無著足受持兩種大車軌啓贍部州智慧眼聖天勇師及佛護清辨論師月稱足世親安慧與陳那法稱師等贍部嚴持佛教幢不隱沒諸智者王皆敬禮頗有多聞諸教法於正理路亦勤習內證功德不下劣然終未達此深處由師妙音恩善見以悲愍心我當說欲證諸法真實慧無比說者當敬聽護國問經云空性寂靜無生理衆生未解故漂沒悲尊以多百方便及百正理令彼悟謂諸法真如極難通達若不通達難脫生死由見此故大悲大師以多方便及多理門令彼解悟故諸智者應當勵求了解真實之方便此復要辨佛經了不了義辨彼二義非唯經說此是了義此非了義便能辨別若不爾者諸大論師造論分辨了不了義皆無義故經中安立了不了義之理多不同故又如經說此是此者唯依彼語不能安立決定應爾總既不定別於了不了義唯經說云此是此者亦不能成立故故佛授記能辨佛語了不了義諸大論師解釋了不了義又了義經義若作餘解所有違難不作餘解義定唯爾所有能立皆善抉擇當隨彼論而求密義故究竟者須以無垢正理而辨若宗違理其師不堪為定量故諸法真實須有證成正理而立故由見此故經云苾芻或智者當善觀我語如煉截磨金信受非唯敬如是辨了不了義分二甲初依止解深密經甲二依止無盡慧經初中又二乙初列經所說乙二解釋經義初又分四初又分四丙初問經離相違丙二答離相違丙三明三自性體丙四白彼結成義今初解深密經云世尊以無量門曾說諸蘊所有自相生相滅相永斷遍知如說諸蘊諸處緣起諸食亦爾如是又說曾說諸諦所有自相遍知永斷作證修習曾說諸界所有自相種種界性非一界性永斷遍知以無量門曾說三十七菩提分所有自相能治所治及以修習未生令生生已堅住不忘倍修增長廣大世尊復說一切諸法皆無自性無生無滅本來寂靜自性涅槃未審世尊依何密意作如是說一切諸法皆無自性無生無滅本來寂靜自性涅槃我今請問如來斯義惟願如來哀愍解釋說一切法皆無自性無生無滅本來寂靜自性涅槃所有密意此文顯示有諸經中說一切法無自性等亦有經中說諸蘊等有自相等文似有違實須無違故問依何密意說無性等即由此文義亦請問依何密意說有自相等此中自相支那大疏等說是別相不應道理經於遍計所執時顯然說為自相安立故遍計所執亦有別相應不可說遍計執是相無自性故種種界性非一界性疏中雖作他解然依下文是十八界及以六界不忘即不失念丙二答離相違分二丁初釋無自性所有密意丁二釋無生等所有密意初又分三戊初略標戊二廣釋戊三顯喻今初解深密經云勝義生當知我依三種無自性性密意說言一切諸法皆無自性所謂相無自性性生無自性性勝義無自性性謂依三種無自性說無自性決擇分云問世尊依何密意說一切法皆無自性答由依彼彼所化勢力故說三種無自性性唯識三十頌云即依此三性立彼三無性故佛密意說一切法無性有人釋云般若經等說一切法皆無自性者意說一切世俗諦法非說勝義此違解深密經及無著兄弟諸論亦出龍猛父子等宗以問依何密意說無自性者是雙問依何密意說無自性及無自性之理答亦次第答彼二義釋初義時謂色乃至一切種智無量無邊諸法差別說彼一切無自性者攝為三種無自性中由宣說彼無自性理易於了解故總攝為三無自性彼三亦攝勝義世俗一切法故必當如是解者以般若經等於五蘊十八界十二處一切諸法一一皆說無事無性無體尤說空性法界真如等勝義一切異門皆無自性如是諸經宣說諸法無自性之法中說無勝義誰有心者能作彼說戊二廣釋若凡所說無自性諸法皆三無自性攝何等為三無自性理復如何耶釋初無自性解深密經云云何諸法相無自性性謂諸法遍計所執相何以故此由假名安立為相非由自相安立為相是故說名相無自性性此初二句問答遍計所執即相無自性何以故徵其因相答所遮品謂非由自相安立能成立品謂由假名安立如此經文如是分段下二相時亦當了知遍計執上所無之相自性者謂由自相成立或安立此中所說有無自相是以觀不觀待名言安立而分然名言安立亦非定有安立之理與中觀應成派師凡有皆是名言安立之理極不相同其有無自相之義亦不相同然有此宗之有自相執定有應成派宗有自相執或於少事不如前執而有後執釋第二無自性解深密經云云何諸法生無自性性謂諸法依他起相何以故此由依他緣力故有非自然有是故說名生無自性性依他起上所無之生性或自性生者謂非自然即自然生亦即自生如攝決擇分云諸行皆是緣起性故由緣力生非是自生故名生無自性性此宗是於依他起上由無如上自性生之自性故說為無性非由無自相安立說為無性釋第三無自性有二道理初立依他起為勝義無自性解深密經云云何諸法勝義無自性性謂諸緣生法彼由生無自性性故說名無自性即由勝義無自性性故亦名無自性何以故勝義生於諸法中若是清淨所緣境界我顯示彼以為勝義依他起相非是清淨所緣境界是故亦說名為勝義無自性性謂依他起由無勝義自性故說名勝義無自性若緣何法修習能盡諸障即為勝義緣依他起修習非能清淨諸障礙故若爾何不安立遍計所執亦名勝義無自性答若唯由非清淨所緣境界而安立者實有彼難然為破除邪分別故依他非是清淨所緣立為勝義無自性不立遍計所執所以者何謂緣依他起上遍計執空數數修習能淨諸障如是亦緣有法依他疑彼亦是清淨所緣故是勝義遍計執上無彼疑故無彼疑過譬如定解聲是無常能遣計聲常執然唯緣聲則不能遣常執而無相違依他起相於清淨所緣為勝義之勝義理中雖不成立然於所餘勝義理中成不成者下當廣說立第二勝義無自性理解深密經云復有諸法圓成實相亦名勝義無自性性何以故勝義生若是諸法法無我性說名諸法無自性性即是勝義言勝義者謂一切法無自性性之所顯故由是因緣說為勝義無自性性此說諸法法無我性圓成實相由是清淨所緣境界故是勝義由是諸法無我自性之所顯示所安立故亦名諸法無自性性故名勝義無自性性又解深密經云若勝義諦相與諸行相一向異者應非諸行唯無我性唯無自性之所顯現是勝義相又譬喻時唯於無色立為虛空說亦如是安立無我以於有為有法斷除法我無戲論之滅即安立為法無我性圓成實相極顯然故若許此經說真實義是為了義而不安立唯破所破即是不變圓成實性反說不待破除所破唯於心現自然成就實為相違此宗圓成實唯由破除諸法我性說名諸法勝義無自性非所破自性由無自相而說為無自性戊三顯喻三無自性喻如何等解深密經云譬如空華相無自性性當知亦爾譬如幻像生無自性性當知亦爾一分勝義無自性性當知亦爾法無我性之所顯故遍一切故遍計所執如空華者是喻唯由分別假立非於所知喻其全無依他如幻至下當說圓成實喻文中自顯經說皆無自性其無自性之理當如是解若不爾者說三自性皆由無其自相安立名無自性是於宣說無自性經如言執義若如是者獲得無見或斷滅見俱謗三性成無相見故若依他起無自相者應無生滅故謗依他起若圓成實無自相者應非諸法本性若謂縱許無自相見謗餘二性云何亦謗遍計執耶若餘二自性無自相者應無彼二若爾則無遍計所執所遍計事能遍計名遍計所執全非有故解深密經云於我甚深密意言說不能如實了解於如是法雖生信解然於其義隨言執著謂一切法決定皆無自性一切諸法決定不生決定不滅決定本來寂靜決定自性涅槃由是因緣於一切法獲得無見及無相見由得無見無相見故撥一切法皆是無相誹撥諸法遍計所執相誹撥諸法依他起相圓成實相何以故勝義生由有依他起相及圓成實相故遍計執相方可施設若於依他起相及圓成實相見為無相彼亦誹撥遍計所執相是故說彼誹撥三相於義隨言執著之言者謂說無自性經說一切法於勝義中皆自性空及自體空自相空等若於彼等如說而取此宗說為如言執著於依他起及圓成實相見為無相者是見彼二非由自相之所安立何以故以下顯示誹撥三自性之理若如經說無自相生滅而執為實亦是誹撥依他起故應當了知亦撥餘二以若生滅非由自相之所安立此宗則謂生滅全無丁二釋無生等所有密意如是已說無自性理說無生等密意云何謂依初後二無自性密意而說依初密意解深密經云當知我依相無自性性密意說言一切諸法無生無滅本來寂靜自性涅槃何以故勝義生若法自相都無所有則無有生若無有生則無有滅若無生無滅則本來寂靜若本來寂靜則自性涅槃若自性涅槃則無少分更可令其般涅槃故此說遍計所執無生滅之理謂無自相所安立故若有生滅則必由自相安立故亦顯示依他起性有由自相安立生滅離生滅者定是無為非煩惱法是故說為本來寂靜自性涅槃諸憂惱者此中是說諸煩惱故出憂惱即藏文之涅槃義也依後密意解深密經云我亦依於法無我性所顯勝義無自性性密意說言一切諸法無生無滅本來寂靜自性涅槃何以故法無我性所顯勝義無自性性於常常時於恆恆時諸法法性安住無為一切雜染不相應故於常常時於恆恆時法性安住故無為由無為故無生無滅一切雜染不相應故本來寂靜自性涅槃支那大疏釋常常時謂前前時釋恆恆時謂後後時若爾此中無自性意通指三事無生等義不取中間無自性事集論則云於遍計所執自性由相無性故於依他起自性由生無性故於圓成實自性由勝義無性故又於彼說言一切諸法無生無滅本來寂靜自性涅槃依何密意說如無自性無生亦爾如無生無滅亦爾如無生無滅本來寂靜亦爾如本來寂靜自性涅槃亦爾總依三相說無生等其義云何耶支那大疏說經中不說依他起生無自性為密意者是顯非無緣生義故集論說者是依無自然生及無因生故然經中義謂依他起有自相生滅故說無生滅不取依他起又依他起多是雜染所攝故亦不作後二句意趣本來寂靜自性涅槃二句集論意趣謂依三自性各各所無自性如其無自性如是則無生無滅本來寂靜自性涅槃丙三明三自性體若遍計執是相無自性云何遍計執性解深密經云若於分別所行遍計所執相所依行相中假名安立以為色蘊或自性相或差別相假名安立為色蘊生為色蘊滅及為色蘊永斷遍知或自性相或差別相是名遍計所執相此初三句顯示施設遍計所執所依以下顯示遍計之理若云此是色蘊是為假立自性若云色蘊生等是為假立差別下當詳釋若依他起是生無自性云何依他起性解深密經云若即分別所行遍計所執相所依行相是名依他起相初句明誰境二句明施設遍計執所依三句明自體若圓成實是勝義無自性云何圓成實性解深密經云若即於此分別所行遍計所執相所依行相中由遍計所執相不成實故即此自性無自性性法無我真如清淨所緣是名圓成實相言法等者謂法無我真如緣彼修習清淨諸障即圓成實相何為法無我謂無自性性後言性者義為即也無何自性耶謂即此自性是明前說遍計所執自性言即此者遮遣餘性義謂非無餘二自性之性唯無遍計所執自性是圓成實前云若即於此者謂從分別乃至行相中顯依他起是空所依言遍計所執相不成實者謂遍計所執空即圓成實極為明顯故許此經所說空義是真了義又許後自性由前二自性空是圓成實亦成相違又空之相非遣餘法猶如地上空無有瓶是依他起空無遍計執性如補特伽羅空無實法是故經云由遍計所執相不成實故又此所空遍計所執此經兩處明遍計所執唯說假立自性差別未說其餘遍計所執其理后釋如於色蘊如是於餘四蘊十二處十二緣起四食六界十八界一一法中皆應廣說三相於苦諦中施設所依如前假名安立以為苦諦苦諦遍知或自性相或差別相是遍計所執依他起相同前圓成實亦同前說即此自性無自性性如是於餘諦皆應廣說七類菩提分法亦應廣說施設所依如前假名安立以為正定及為正定能治所治等如前廣說或自性相或差別相是遍計所執所餘二相如苦諦說此是勝義生啓白大師謂我領解如前所問從色蘊乃至道支於彼一一皆立三相如來於彼密意宣說三無自性丙四白彼結成義分二丁一引經丁二略釋經義今初如是經中有說諸法皆有自相有說諸法皆無自相有善分別有無自相成三類經此三合為善分未分有無自性二類所攝善分別者其義不可更作餘解故是了義未分別者義須更解故非了義此復有二故二類經是不了義一是了義由前所說自當了知即此內容之義依時次第配三法輪了不了義如解深密經勝義生白佛云世尊初於一時在婆羅痆斯仙人墮處施鹿林中惟為發趣聲聞乘者以四諦相轉正法輪雖是甚奇甚為希有一切世間諸天人等先無有能如法轉者世尊彼時所轉法輪有上有容是未了義是諸諍論安足處所世尊在昔第二時中惟為發趣修大乘者依一切法皆無自性無生無滅本來寂靜自性涅槃以空性相轉正法輪雖更甚奇甚為希有世尊彼時所轉法輪亦是有上有所容受猶未了義是諸諍論安足處所世尊今於第三時中普為發趣一切乘者依一切法皆無自性無生無滅本來寂靜自性涅槃以善辨相轉正法輪第一甚奇最為希有世尊於今所轉法輪無上無容是真了義非諸諍論安足處所丁二略釋經義分二戊一略釋經文義戊二略釋了不了義今初初轉法輪中初句顯處所次句顯所化機從以四諦至如法轉者顯示法輪自性言四諦相者顯所詮法甚奇等是讚歎彼時等顯非了義言有上者謂過此上尚有勝教有容者謂除此外有容勝教有容他破未說空性而說實有是未了義有諍論者謂聲聞人諍論依處是圓測釋然經文義初句有上者謂過此上有真了義第二句文謂於此義如言執著容有敵者攻難過失支那疏中譯為有難其義亦爾第三句文謂此中義須作餘解第四句義謂未顯了分辨其義故於其義可興異諍第二法輪中從依一切法至涅槃者顯所詮法惟為等顯所化機以空性相有疏為說法無我支那大疏謂以隱密相義即祕密彼釋較善義謂後二法輪所詮同依無自性說惟宣說相別第二法輪未如前辨自性有無故名隱密相後則分辨故名顯了圓測三藏惟說觀待第三為有上等天竺真諦論師雖有異解未見善哉故茲不録自宗如前第三法輪中所詮與第二同所化謂為發趣一切乘者前二法輪別為大小乘機此通二機善分辨者如前所說於色等一一法皆立三相及於彼等明三無性言於今所轉法輪加近詞者指無間所說善辨法輪解深密經及餘如是善辨諸經雖是三時所說諸經若未如是分別自性有無之理亦非所指言無上者顯此法輪之殊勝最上希有更無過勝故名無上無容後勝無容後破故名無容俱顯有無故是了義非諸諍論所依之處是圓測釋除無容初義餘同余前釋有上等反面之義前二類經如言執義容有過難此中無者是因如所言義須否更作他解也有諍無諍謂如經說有無自性義如其決擇為是為非智者觀察無可諍處非說全無餘人諍論戊二略釋了不了義支那大疏說初法輪名四諦法輪第二名無相法輪第三名勝義決定法輪若順經文第三應名善辨法輪此經所立了不了義者謂以善辨未辨立為了不了義之所依即總說諸法皆有自相與總說無相及善辨有無之三經由前問經離相違過及其答文并一一法立三自相於彼密意說三無性又依彼等結白前後三轉法輪了不了義最為明顯故是顯示於第一時依四諦相初轉法輪說有自相等是不了義非盡顯示凡初時說一切經典譬如初時在婆羅痆斯為五苾芻說諸學處謂當圓整著裙等此中無須更斷疑故如是第二亦唯指說無自性等雖是第二時說若未依於無自性等亦無問經離相違時之疑故於此中不須明彼為不了義說第三法輪為了義者是指如前說善分辨者非指一切即此經中亦極顯然譬如臨涅槃時所說隨順清淨略毗奈耶非此經說彼為了義故此經為成何義而辨法輪了不了義耶謂對所化機為欲遮遣於未辨諸法一向宣說皆有自相及無自相如言執著及為顯示遍計所執是無自相餘二自性是有自相及依他起上遍計所執空之空性是道所緣究竟勝義故說初二法輪是不了義後是了義是故有師依止此經成立第三時所說一切經皆是了義佛為引攝執我外道所說數經許為如實唯除法性餘一切法皆是錯亂覺慧假立無少自性唯法性真實分辨如此真不真實許是前說善辨之義有餘師說若如此經所辨了不了義則如前家說故破此了不了義之理謂非如實言如是兩家皆未詳觀此經問經離相違過及佛答釋并依彼而立了不了義唯於分辨了不了義時妄興諍端乙二解釋經義分二丙初無著論師正依解深密經丙二依於此經決擇真實今初攝決擇分云勝義具足五相如解深密經應當了知引解深密經勝義諦品諸法相者如解深密經應當了知引宣說三相之法相品諸法無自性相如解深密經應當了知引無自性品問經離相違過及了不了義等如是說有八識身及究竟種性決定等皆引解深密經所說菩薩地真實義品及彼決擇分攝大乘論皆引解深密經說依他起上假立自性差別遍計執空為圓成實義以多異門而廣決擇莊嚴經論辨中邊論等所說真實義及諸釋論中所說要義皆與此經義極符順故於此宗決擇此經之義最為根本丙二依於此經決擇真實分三丁初總明離二邊丁二別破增益邊丁三由此分辨諸經了不了義初又分三戊初菩薩地所說戊二決擇分所說戊三餘論所說初又分二己初見為增益損減己二破彼二見今初菩薩地云云何而有謂離增益實無妄執及離損減實有妄執如是而有謂離增益損減而有所言增益損減云何此二亦如菩薩地云於色等法於色等事謂有假說自性自相於實無事起增益執此說增益相於假說相處於假說相依離言自性謂一切種皆無所有於勝義有真實有事起損減執當知此二於佛所說法毗奈耶俱為失壞此前半段明損減執當知以下顯示失壞大乘深法於色乃至事者明遍計所執處假說自性者是指由言說假立之自性非指能立之言說攝決擇分等極為明顯菩薩地中餘處之文皆如是知若於假說自性自相非實有上執有彼自相者是增益執假說相依者是釋假說相處謂遍計所執假施設處於勝義有離言自性執一切種皆無所有者是損減執由是因緣若謂遍計所執勝義有者是增益執若謂餘二自性非勝義有者是損減執以初是世俗有後二是勝義有故如於勝義有撥為無者說名損減則於勝義無執為有者應名增益此處僅於遍計所執執有自相說為增益雖未明說執彼自相為勝義有然自相有即勝義有是此論義故於此宗若遍計執勝義有者即增益執又解深密經說依他起是遍計所執所依行相自性差別假施設處故此論說於假說相處勝義實有撥為皆無雖是正說依他起相然彼若非勝義實有則圓成實亦勝義無故俱說二相無有過失菩薩地云若於色等諸法起損減執即無真實亦無虛妄如是二種皆不應理於依他起事起損減執者非唯說云名言中無或總云無是如上說於勝義有撥云全無己二破彼二見增益損減若如是者破彼二見其理云何其增益邊謂隨於何法增益自性及彼差別即明彼法勝義空理便能破除如下詳釋損減之義菩薩地文如上所引後又破云譬如要有色等諸蘊方有假立補特伽羅非無實事而有假立補特伽羅如是要有色等諸法實有唯事方可得有色等諸法假說所表非無唯事而有色等假說所表若唯有假無有實事既無依處假亦應無此中所破損減敵者非餘外道亦非自教諸聲聞部彼等不許假名依處色等實事無自相故故如決擇分說是大乘宗彼說諸法皆無自相故是宣說無性諸師彼等非許依他起等諸法一切總無及名言無是說非勝義有故若破云無唯事者是如前說於勝義有真實有事破謂非有以此宗意雖遍計執無有自相及勝義無不須斷無然餘二性若勝義無或無自相則成斷無又此宗想依他起性心心所法依自因緣而生者若是自相生即勝義生此若無者則唯妄心假計而生心心所事生全非有故若答云依他起性所有生滅唯就錯覺執為生滅故其生滅於世俗有不成損減不能釋難猶如說云就錯執繩為蛇之心繩可是蛇然繩非蛇依他起之因果唯就錯執有因果心是為因果然依他起自無因果若如是許則不能安立從善惡業生苦樂果故不能離損減執過若謂非許如是因果則許因果是有自相故勝義有義善成立由依此想故說若無假所依處假亦非有何有一切諸法唯假及唯此是真實耶故是最極斷無見者菩薩地云如有一類補特伽羅聞說難解大乘相應空性相應密意趣義甚深經典不能如實解所說義起不如理虛妄分別由不巧便所引尋思起如是見立如是論一切唯假是為真實若作是觀是為正觀彼於虛妄所安處所實有唯事撥為非有是則一切虛妄皆無何當得有一切唯假是為真實由此道理彼於真實及以虛妄二種俱謗都無所有由謗真實及虛妄故當知是名最極無者菩薩地又說世尊依彼密意說言寧如一類起我見者不如一類惡取空者前者唯於所知迷惑然不誹謗一切所知不由此緣生奈落迦於他求法不為虛誑於諸學處不生慢緩後者與此相違由是因緣菩薩地又說於此無彼由彼為空餘實是有如是知者名為無倒悟入空性謂於如前色等諸事由其假說自性皆空是前句義餘實是有者謂假所依唯事及唯假有由何故空謂遍計執空所依事謂依他起由前空後所顯空性即圓成實此等有無之義如前已說如是遠離增益執故即離有邊離損減故即離無邊故亦即是顯示無二如是空性即是究竟勝義菩薩地云先所說有今說非有有及非有二俱遠離法相所攝真實性事是名無二由無二故說名中道遠離二邊亦名無上戊二決擇分所說分二己初敘述敵宗問答彼義己二破其所答今初攝決擇分云於大乘中或有一類惡取空故作如是言由世俗故一切皆有由勝義故一切皆無此述諸中觀師分辨諸法有無差別謂一切法於勝義無於名言有次云應告彼言長老何者勝義何者世俗如是問已彼若答言若一切法皆無自性是名勝義若於諸法無自性中自性可得是名世俗何以故無所有中建立世俗假設名言而起說故此問何為二諦其答即是敵者此問何為勝義者是問勝義諦所相事非問言勝義無於何勝義中無無處勝義若不爾者答云諸法皆無自性是名勝義不應道理以中觀師於法無我勝義中有而不立為勝義有故問何為世俗者是問世俗諦由於何世俗前立為諦實非問言名言有有處之名言若不爾者答云於無自性中執有自性是名世俗不應道理以彼是實執其所執境雖於名言中觀論師亦說為無故以言無自性時所無之自性是諦實性故己二破其所答分二庚初顯他宗相違庚二明自宗無違今初先破所明世俗決擇分云應告彼曰汝何所欲自性可得為從名言世俗因生為唯名言世俗說有若從名言世俗因生既從名言世俗因生而云非有不應道理若唯名言世俗說有無依處故而有名言世俗不應道理此中義者謂於勝義無自性中執有自性之世俗即內名言爾時為由前念同類因生耶抑唯由世俗名言分別假立耶若如初義謂由因生而云非有不應理者是說非勝義有以此是諍於勝義中有無時故及彼敵者許勝義無非云總無故若如二義唯由分別假立不應道理以無假立所依處故若唯由世俗名言分別假立則餘諸法皆唯爾故次破所明勝義即前論云又應告言長老何緣諸可得者此無自性如是問已彼若答言顛倒事故復應告言汝何所欲此顛倒事為有為無若言有者說一切法皆無自性是名勝義不應道理若言無者顛倒事故諸可得者此無自性不應道理此中義者謂彼諸法現有自相自性可得而云彼無如何應理即能緣量為違害故若謂如是能緣之心不相妨害以彼覺心是錯誤事故若爾彼錯誤心是有自相說無自性是勝義諦不應道理若云無者而云是錯誤故雖現可得而非是有不應道理此雖亦觀勝義有無然義相同又前觀察易於了解故如上說如是此中若遍計執及圓成實於勝義無唯名言有未顯其過唯審觀察世俗之識及錯亂識勝義有無而顯過者是破依他起於勝義無唯世俗有以此即是圓成實之有法及遍計執能遍計者所遍計事故諸智者最要辨此勝義有無又如決擇分云若於依他起自性或圓成實自性中所有遍計所執自性妄執應知名增益邊又云損減邊者謂於依他起自性及圓成實自性諸有法中謗其自相言無所有如是真義理門由遠離二邊理門應隨決了謂後二自性是有自相若謗非有是於自相起損減執故菩薩地與此分中增減二邊及斷除法所說相同言無遍計所執者亦由勝義非由名言決擇分云此諸現觀由如是名由如是言所安立故當言是彼自性當言非彼自性答世俗說故當言是彼自性第一義故當言非彼自性又云若諸名言熏習之想所建立識緣遍計所執自性為境乃至此唯假有非勝義有故以是二我遍計所執雖於所知決定非有然非由彼一切遍計所執皆悉非有故破實有及勝義有而立假有及名言有故解深密經一類大疏說遍計執於二諦俱無能所二取依他起性緣生如幻於世俗有圓成實性是真勝義於無性有是勝義有其說非此經意違攝大乘論引解深密經成立無外境說內外二取是遍計執亦違菩薩地及決擇分又彼引有決定論文故有說是無著所造太無觀察決擇分中除解深密經序品而外所餘諸品多已引訖於諸難處已善決擇故彼論師亦無別造解釋必要末代有人謂初自性世俗亦無中性於世俗有於勝義無後性於勝義有說是無著兄弟意趣者亦出此宗之外尤彼所說依他起於世俗中有之義謂唯由亂心於彼妄執有生滅等而彼事上實無生滅當知此即菩薩地所說究竟誹謗依他起性由是因緣亦謗所餘二性故俱謗三相最極斷見者於許解深密經為了義之宗中是無可免相違過失
