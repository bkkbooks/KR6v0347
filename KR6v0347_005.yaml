body:
  text: 宗喀巴大師造法尊譯壬二不許自續因之理若自相所成宗因喻皆無所有依此增上非僅無有自續之因即一切能作所作皆不應理然破彼已能立所立一切作用皆為應理此宗不許自續之因及所立法其理云何顯句論中以三種理解說此義謂破自續之正理如是正理他亦義許所說衆過自宗不同此如清辨立云於勝義中諸內根處定無自生是已有故如已有識破云所言勝義若簡別宗待自無益以於世俗自亦不許有自生故待他無益以彼外道俱壞二諦理應雙依二諦而破不加簡別破尤善哉於世名言破許自生不應道理故待世間理亦不應加彼簡別以諸世間唯許從因而有果生非更分別自他生故又他所許勝義眼等若於世俗亦破其生爾時所依有法不成犯宗因過以自不許有勝義眼等故若謂雖無勝義眼等然有世俗眼等故無過失若爾所說勝義是誰簡別若謂世俗眼等破勝義生是破生簡別此不應理未作如是說故汝意縱說然有法於他不極成故救此過云如佛弟子對勝論師立聲無常唯可取總不取差別取別則無能立所立以取大種所造聲為有法勝論不成若取空德聲為有法於佛弟子不極成故故捨差別唯以總聲而為有法如是此亦棄捨勝義世俗差別唯取眼等而為有法故無有法不極成過答彼說云清辨自許眼等有法之自性非顛倒心之所得倒與無倒是正相違顯此等理而善破除彼等義謂成立眼等不自生時其有法中不能棄捨二諦差別立總眼等以能測度有法之量是於眼等自性不錯亂識無顛倒識於彼自性不錯亂時其所得境必無虛妄顛倒所知實無自相現自相故此有二因已許前因之理謂凡是有即許為自性有之宗中若待自所變現自相而成錯亂不能立為獲得所量故有無分別任隨何量然於現境著境自相自成量處須無錯亂爾時須於境義實體自性而成為量非於名言唯名假立是彼自許若如是量所得之義而是顛倒所知則成相違故後因亦成如是若顛倒識所得之義而是無倒所知亦成相違故不能遣有法不極成過若作是念如緣聲之量雖常無常二品決斷然不須成立以無常量或常住量差別之量而為成立有法聲之量如是此識雖亂不亂二品決斷然說是成立有法之量時亦不須辨彼二差別又如其聲常與無常二品決斷緣聲之量雖俱不得聲常無常然緣彼聲而無相違如是眼等所知顛不顛倒二品決斷推度眼等之量雖俱不得眼等所知顛不顛倒然緣眼等亦無相違故說不可唯取眼等而為有法之理皆不應理清辨師等及說實事諸有智者皆不致起如此疑惑故月稱師亦未解釋然在現世無知敵者則起彼疑故當略說觀察彼義是否由量成時言由量成者若量是無分別則謂彼義如現而有若量是有分別則謂彼義如其所著或如所定而有當知彼義即所說境此即無錯亂義由彼境界如自顯現如自決定安立為有即立彼識於所現境於所著境或所定境為無亂故故是事實決斷豈是由心成立而未決斷如是觀待所現自相無錯亂識所得之義即安立為正確所知故所知正倒亦是事實決斷豈是於心而不決斷此是凡有即許為自性有之敵者由量成立之理非自宗義故如自續諸師之義如是眼等有法正確所知雖是無錯亂識之所得然其名義皆不須成二諦差別即取彼眼為所別事而可觀察勝義有無故於取總為有法者觀察二諦差別所說諸過皆不能轉月稱意謂如是有法即自性有以彼即是勝義有義豈有總體有法為所別事故破棄捨差別唯取總體以為有法若能了知此諸關要則自續師說同現然作事有能無能故正確非正確為世俗差別然於內心不分正邪應成師說觀待世間俱於心境安立正邪然於自宗則不安立此等理由皆能了知若謂於有分別及無分別現似自相而實非有由此亂識安立有法則其所立無自性義他已極成豈可更為成彼敵者故有法不成之過仍住未移設作是難若錯亂識所得之義與無倒所知有相違者則比量智所得之義與勝義諦亦應相違若不許是唯顛倒識之所獲得是於自性無錯亂識之所得者一切世俗亦皆應爾彼是如來盡所有智之所量故唯字遮遣無亂得故答無初過比量理智於所現境雖是亂識然彼所得非亂識得無相違故如所得螺聲是聲是妄然未能得螺聲虛妄無相違過若觀唯字所加之處雖容生彼疑然隨說者欲樂是欲遮遣觀如何有觀智所得故說唯字非遮無亂識之所得顯句論云我等亦說世間名言無須如是審細觀察唯以顛倒世俗得有我性所依有法真實失壞是彼自許句餘處解釋與此處釋雖有不同然破自續宗義無異如是已破法義今當破喻謂佛弟子對勝論師立聲無常雖彼二宗無有共量能成有法為大種造及虛空德但望何處成量之總聲可說是有成立眼等無自生時自性空宗與性不空宗若俱不量自性有無則互不能說量度有法自性為何故喻不是此中清辨師等自續諸師不能立云雖無離如是差別之總法可說然不分別勝義諦實有無之別唯取其總以為有法以自性有即諦實有之義故所破限齊不相同故有上差別故彼二宗成立聲無常時雖俱不成彼二差別然可宣說其聲是有但彼二宗量聲之量於聲何義而成為量其量亦無無有二宗共許之量也此依許自性有為立者而說若應成師而為立者對彼敵者全不分別自性有無亦不可說以量成立有法之理由是諸理其因不成亦當了知清辨論師於他所立內諸處有能生因緣以是如來如是說故之因問如是說若是世俗汝自不成若是勝義於我不成觀察二諦而說過故故審有法為亂不亂何識所得觀察差別而說過難極為應理此之理由如入中論云由見諸法有真妄所得即為二體性見真之境即真實見妄說為世俗諦謂由見真實所知及見虛妄顛倒所知之識所得二境即說彼為二諦義故若如此說唯以二諦觀察因者須問以何為其因義若並未以彼二差別之總而作三種觀察之時則須問其立何為因如是諸過於自立量不同之理則謂由自不許自續自宗成立所立諸量唯於敵者極成即可以彼唯為遣邪執故若疑隨一極成猶不足者則以世間諍訟為喻說彼即足雖許能立能破俱須兩共極成之陳那論師亦許前說以許自教相違及自比量唯於自成即滿足故般若燈論說他過時問為依自在為依能破此處所譯自在與自續義同故若不攀敵者所許即以正量就義實體自在成立二種有法前陳有法及喻有法及諸因相生比量智證知所立是自續義此對凡有即許自性有之敵者於未成立所立之前俱不分別自性有無不能令解如是以量成立所量故雖許因及所立法然不許自續之因及所立法如依緣起之因及影像喻立他比量成立苗芽無自性時非自不許苗是緣起及凡緣起皆無自性名他比量非共極成是如前說由於敵者不能以量自在成立是為自他不能以量極成之義苗芽及苗是緣起等是由俱生名言量所成立立敵心中雖亦俱有然於敵者前彼與測度自性之量和雜為一乃至未生正見不能判別故立者雖能判別然於爾時不能宣說應成諸師自內互相不攀所許雖可宣說以量極成然是名言增上所立之量非是諸法自性增上所立之量故非自續如於苗上有三種執謂執有自性執無自性及執俱無彼二差別已生正見之身中三種俱有然未生正見之身中唯有初後若善了知此諸差別則知正理非破一切分別所取又執身中未生見前修菩提心等一切皆是執實執相妄覺自身生見之後一切行品悉皆輕捨此諸邪見亦善遣除故以他比量因成立所立非唯他許便為滿足要自以量成立他亦決定或他受許若不爾者則於所著境界錯亂由彼不能引生通達真實見故其名言量是達勝義不可缺少之因此即論說若不依名言不能達勝義之義如此宗說則清辨等自續諸師許勝義有及諦實有不可立為中觀師耶答如雖了解彼是大腹而未了解彼事是瓶尚須量成不能說他已許彼事是瓶又勝論師於瓶甌上離瓶支分別無異體有支之義雖量已成然不能說非許有支異體之宗如是彼諸論師以無量理破許諸法諦實之宗自亦善許無實之義故彼皆是中觀論師此說凡中觀師不應許自續者亦不相違譬如制後苾芻不應違犯佛制然不因略違佛制便非苾芻己三斷除此理與經相違分二庚初斷除違背解深密經庚二顯彼不同彌勒問品今初解深密經由三相門分別有無自性及安立了不了義餘師所許如前已說今此論師如何許耶聖父子論堪據者中對於此義未見明說佛護論師亦未明說彼義差別入中論云由此教顯如是相餘經亦是不了義自釋中云何為如是行相經耶謂如解深密經說遍計執依他起圓成實三自性中遍計無性依他有性如是又說阿陀那識甚深細一切種子如暴流我於凡愚不開演恐彼分別執為我此等如云如對諸病者醫生給諸藥如是對有情佛亦說唯心此教顯彼是不了義謂若分別初二自性有無自性及說阿賴耶識等字中攝說無外境及說究竟種性決定此說彼四皆不了義其中最後是不了義意謂由集經論成立一乘即能了知故入中論本釋唯以教理成立前三是不了義此處之文即是以教顯不了義說唯心者有破不破外境之二破外境經如說外境皆非有等楞伽經說譬如醫生非隨自樂於各病者而給諸藥是須隨順病者病相如是大師宣說唯心亦非自樂是隨所化意樂增上故顯然說是不了義論次又云如是佛於經中說如來藏引經之後又云如是行相之經凡唯識師許為了義者即由此教顯彼一切皆非了義入中論疏解此義云以說如來藏是不了義為喻顯說唯心亦非了義言由此教者是十地經觀緣起時破餘作者此解非理以自釋中用說唯心是不了義為喻證說如來藏是不了義之理由成立如是行相之經凡唯識師許為了義皆非了義言由此教凡有二處此處是引楞伽經中說如來藏是不了義及說無自性遍一切經破餘作者是證十地經說唯心唯字非遮外境非證破除外境是不了義如是行相經者是如前引解深密經所說非顯宣說如來藏是不了義之經唯識宗師許為了義以於彼經兩無諍故自宗此引說如來藏是不了義之經者是為成立解深密經說阿賴耶非如言義此中先須了知說如來藏非如言之義如楞伽經云順有情意所說諸經是權便義非如實言譬如陽焰實無有水欺惑渴鹿彼所說法亦為令諸愚夫歡喜非是聖智安立之言故汝唯應隨順其義莫著其言又云大慧問曰有契經中說如來藏自性光明本來清淨具足成就三十二相一切有情身中皆有如摩尼寶垢衣纏裹如是亦被蘊界處衣之所纏裹而有垢染然是常住堅固不變此如來藏與諸外道所說神我有何差別外道亦說常住無作無德周遍不壞為我次答彼云諸佛為除愚夫無我恐怖及為引誘執我外道說空無相無願等句義諸法無我無現行境名如來藏故與外道說我不同現未菩薩不應於此而執為我欲令諸墮我見意樂有情安住三解脫境速成正覺為利彼故說如來藏是為遣除外道見故隨如來藏無我義轉因恐文繁茲不廣引此中密意所依是法無我空性為令捨離無我恐怖及為漸引執著我者趣向無我以此為因成立說如來藏與說有我二者不同如是當知執有我者想何而說即所說事大師為想何義而說其意趣義與所說義則大不同執有我者說我常等欲所說義於一切時堅固決定大師所說是暫顯有所說之義後仍引趣所想之義故辨彼二其說不同此即顯示若於前說如來藏義如言起執即與外道說我相同如言違難亦即此義不可如言而起執者前引陽焰法喻謂當隨義莫著其言如是等文極為明顯故由此經而於餘經如是說者由顯彼經密意所依及其所為如言違難能不能成是不了義諸有智者誰復相諍若不許此解而說於此經如言之義顯示正理違難解釋此經是不了義者乃是印度智者教授故如是釋然非前經作如是說唯是自露本性而已集經論亦云如來為依所化增上說種種乘顯示如此甚深法性結合之後引前所引諸經其以近辭云此甚深法性者指彼前文所引宣說法無我空性般若經等言所化增上者謂所化意樂增上而說即前所說是令愚夫歡喜之語非如實言之義如言起執與說有我相同之理謂若非於破有自相及自相生法我戲論所顯空性無生無我之義密意說為有如來藏而執如言所宣說者則彼之常亦非唯遮可壞滅法立為無壞故非觀待破除所破而立猶如青黃現有自體而體是常如是便與外道說我是常住之理無有差別則當許為是常住事此中違難即大小乘破外道許常住有事所說諸理故彼諸師亦皆不許如是常義若許常義非唯遣除有生滅法所顯而是有體則暫非說二無我之法器謂由破除二我戲論所顯二無我性故彼諸經為令除遣無我恐怖及為引誘執有我者如前而說故不了義總有二類若為引誘自部有情暫可演說補特伽羅共同無我及法無我粗分之器而令趣向真實義故所說不了義法於此如言極難出過若如前說為引他部執我有情或由前生多習彼見暫且非堪具足演說補特伽羅共無我器外道種性對彼所說不了義法於此如言易顯過難如是由知說有常等如來藏法是不了義云何能成說阿賴耶亦非了義耶答如厚嚴經云地等阿賴耶亦善如來藏佛於如來藏說名阿賴耶劣慧者不知藏名阿賴耶楞伽經亦云說如來藏名阿賴耶識具前七識多說彼二唯是異名由說彼二一是常住一是無常故非說彼如言義同然於何義密意宣說名如來藏即於彼義密意宣說名阿賴耶望所密意唯是異名故義是一由是因緣故說前經是不了義亦成後經是不了義入中論釋云隨一切法自性轉故當知唯說空性名阿賴耶識月稱論師即如是許頗有自命善唯識者由見起信說如來藏名阿賴耶與唯識說不能相符即便驚愕狂興謗言甚至說非印度人造誠乃少見多怪之相無始時來界頌攝大乘中引證阿賴耶識無著寶性論釋中引證如來藏月稱亦說彼二義同名異厚嚴楞伽文如前引皆與唯識所說不合豈不謗為非無著造非月稱釋非佛說耶故當了知說如來藏與阿賴耶名義雖別然佛意趣同在空性唯因對機有異故佛說法亦殊不應自恃辨聰妄集謗法之罪也如是密意所依雖是一義然所化不同其阿賴耶對說之機是堪聽說補特伽羅共無我義及二取空法無我之器不能通達一切人法皆無自性之機入中論云說有阿賴耶有人唯有蘊是對不能了如斯甚深義以若安立阿賴耶識定須宣說外境空故入中論釋如前引說不了義經後又引云大慧空性無生不二無自性相皆悉遍入一切佛經是證判別初二自性有無自相為不了義楞伽經中乃至遍一切經如前說已次云任於何經應當了知皆是此義若爾此宗如何安立三轉法輪了不了義答初法輪中諸說人法無自性者是為了義若唯破除異諸蘊相自立實體補特伽羅而未破自相說人無我及說蘊等諸法有自相者是不了義此密意所依謂名言有其所為義謂若宣說人法皆自相空便生斷見為遮彼過及由宣說粗分無我漸修相續為令趣入微細無我如言違難謂破自相所有正理次第二法輪中宣說人法皆勝義空或自相空唯於世間名言而有謂若有自相繫縛解脫等皆不得成然必須許繫縛解脫等諸緣起法故繫縛等皆自相空是對能達諸緣起義即性空義大乘者說此乃究竟了義般若心經等雖於所破未明顯加勝義等名然說正隨照見此諸五蘊皆自性空奘師譯文從略於略標時說自相空於廣說中亦須例加義已加訖縱未加者猶如十萬頌中所加勝義簡別於其同類一切經中皆應例知故義已加譬如現代同一造者所造諸論所詮若同一處說已餘未說處亦須例知故雖同是大乘種性若於自相所空無自性中不能安立繫縛解脫業果等者若如第二法輪而為說法則當引生極大斷見為遮彼過及由宣說粗法無我漸修相續為令趣入最極微細法無我故由初自性與餘二性在名言中容有唯由假名安不安立之別如瑜伽宗諸師所許故密意說有無自相如言違難謂中論說若諸人法是勝義無全無正理能為違害若勝義有或有自相則因果等一切建立皆不得成如是安立了不了義之理雖與解深密經所立不相符順然順三摩地王經及無盡慧經陀羅尼自在王請問經中以珠寶師三洗三拭漸次淨治摩尼為喻說佛亦現知不清淨有情界先以無常苦及無我不淨厭離之語令諸樂著生死有情起厭離心安立正法毗奈耶中次以空性無相無願之語而令了解佛語之理其後更以不退轉輪語及三輪清淨語令諸有情入佛境界彼諸有情有種種因種種自性令其等入如來法性是故說名無上福田此與三轉法輪不同此是於一補特伽羅次第引導先入小乘次入大乘諸佛境界後令成佛三轉法輪是依異體大小乘機而宣說故集經論中亦引此經證小乘人後入大乘而成正覺成立究竟一乘義故故初二次第皆是引入小乘初時之無我等同四百論於說空見之前為淨相續所說無常等四中之無我謂於我所無自在我不退轉者是入彼已不須更趣餘乘之義若唯識解是彼經義中觀師解與前不符亦是經義則說法者自應相違亦即破壞彼經之義若爾問云任待何緣不開殺生是否聲聞教藏之義若非彼義大小乘藏殺生開遮應無差別若是彼義觀待特緣殺生有開亦是大乘教藏之義則說法者自應相違有何可答若謂殺生待小乘機終無開許觀待大乘少數特機則有開許是說者意故無相違大乘種性暫非具說深義法器待所化心是有自相堪具了解深義法器待所化心是無自相何違之有如云父母應殺害雖言所說非所詮義其說法者樂說之義是以有愛為所詮義此不同彼以此說者欲令此所化於直說義而受持故以此經中應有所詮離如言義亦無其餘所詮可說故如言義即是所詮於如言義顯示過難成立此經非真了義是此所許故有二種一是經所詮義亦是說者意趣二非說者意趣而須立為經所詮義庚二顯彼不同彌勒問品若解深密經三相建立如瑜伽宗師所解彌勒問品所說三相是否亦如是許若許則說般若經等是如言義不應道理如解深密經若不許者則彼經云彌勒當知遍計執色是名無體諸分別色當知有體以諸分別是有體故非自然生諸法性色當知非有體非無體是由勝義之所顯故說依他起是有體性又成立諸法從色至佛唯假名時以由名前覺無等三理成立亦與解深密經相同茲當解釋彌勒問云若有欲行般若波羅蜜多學菩薩行於色乃至於佛應如何學答云應如是學彼皆唯名次又問云若緣色等諸名及所依之事則不可說色等唯名故色等唯名云何應學若無彼事名亦不可說是唯名謂問若有實事唯字則無所遮若無實事名則無依故名亦無答云說名為色乃至名佛皆是於事假立客名此說假名唯是客來此中客者是假造義故遮自性若如唯識此文非破色等實有是破於色等假名自性上色等實有前說從色至佛皆唯假名所有密意謂說色等假立自性唯是假名非說假名所依色等唯是假名若如是者下文問云豈謂色等皆無相耶答云我不說爾問若爾云何答唯由世間名言為有非勝義有此說從色乃至於佛於勝義中一切俱無於名言中一切俱有則不應理故有說云此品顯示般若前說一切諸法於勝義無於名言有所有密意解釋般若為不了義非如理說故由假名安立諸法謂由名言增上安立為有是假造性故無非由名言增上安立之有為名所依非說總無名所依事故有彼事與說唯由假名安立義無相違問若無色名由見色事增上而不生心謂此是色由名增上則生是心故說色是假立客名云何應理謂色若由名言增上而立則於未設彼名之時亦有名言增上而立理應起心念此是色次返問彌勒云若不依名豈於有事生心謂色白言不生告曰由此因緣故說色等假立客名此顯彼理成立色等是由名言增上安立非是成立彼相違品如云若色等法由自相有是則生心念彼名色應不觀待假名而生此如難云苗有自相應不待種次說若於一事有多異名及於多義同一名轉由此因緣亦知色等假立客名亦說色等若非名言增上所立客名則彼諸名應由自相增上而轉若如是者彼皆非理用彼諸理成立亦非必依攝大乘論而為成立如精研論云彼亦非勝義有見有非一能詮所詮雜體過故不定過故故不得成此以三正理中後二正理破勝義有次白云若如是者說名為色乃至名佛隨取何事假立名言色等自性豈非可得謂由說有名所依事豈非色等有自體性答云色等名言所設立義為是色等所有自性為唯假立白言唯是假立告曰若爾前問是云何思此顯雖無自相之體然有名言所依之事及說彼事唯假立名亦無相違次問若色等法唯是名言色等自性豈非可得謂佛前說若唯假立如何問云自性豈非可得顯相違過答說雖唯假立然亦須許能立所立如是須有色等自性故無相違答云唯假立名為有生滅及染淨否白言非有告曰若爾而問若唯假立豈無自性云何應理次問豈謂色等一切種無如前問答謂於勝義破除自性生滅染淨於名言中說色等有其假立名亦是名言故此所說云何能順解深密經無著兄弟不以此品解釋般若為不了義而以解深密經解釋其中道理蓋以此品亦說一切諸法於勝義無唯名言有故亦非堪如言取義說依他起是有體性亦無違者須先了知彼經所說三相之理茲當略說即彼經云彌勒若於彼彼諸行相事依色名想分別言說周遍計度為色自性是名遍計執色乃至是名遍計執佛法此明遍計執言依者謂緣假名所立色義言計度為色自性者非顯由此計度能遍計是顯所計度自性為遍計執分別亦如經云彼行相事唯有安住分別法性依此分別而起言說謂此是色謂此是受謂此是想謂此諸行謂此是識乃至謂此是諸佛法即此名想分別言說是名分別色乃至是名分別佛法此明分別言彼事者是所詮事依止分別起言說之理謂此是色等說如是名等為分別者當知亦攝前之所詮及能分別為分別法是由此分別及於此分別二種事故法性亦如經云由遍計所執色故諸分別色於常常時於恆恆時唯無自性及法無我真如實際是名法性色乃至是名法性佛法此明法性其分別色之無性及法無我等即法性色其分別色由遍計所執色為無性無我其所無之我或自性者即遍計執言常等者謂於一切時此由彼空此理同於入中論釋如云謂如彼蛇於繩上無是遍計執於蛇上有是圓成實由彼於此非遍計故如是自性於依他起緣起所作是遍計執以說自性非假造作不待他故於佛行境是真實性非遍計故由不觸著所作性事純證自性故名為佛當以此安立三性之理解釋經意故中觀師安立三相當如入中論釋所說般若經義其中分別謂從色至佛緣起依他是依最勝而說若於色至佛增益自性名遍計執所益自性即是本性或名自體若依他起有彼自性雖是遍計所執然於諸佛如所有智境中有彼即圓成實若依他起於本性有即遍計執其遍計執空即依他起所有本性此於佛勝義智境中有故同一本性待事差別安立為二謂遍計執及圓成實故於自相所立性中俱無勝義世俗諸法然於法性所立性中無世俗法有勝義諦故有無自性應細分別言不觸著所作性事純證自性者是破現證勝義諦智前有諸有法此不相違如前已說入中論釋云離依他起外別無能取所取謂於依他起遍計二取故應思擇義謂外境內識全無有無之別故能所取俱是依他起由是因緣彼二即是遍計所依說於彼二遍計二取不應道理故彌勒問品所說有無體性之體非是餘論所說實有假有之實體亦非中觀師說由自相有之實體是唯俗有由是因緣說遍計執是無體者意說依他起於本性非有非說名言境等遍計非有說分別有體者經中自說以諸分別是有體故立為有體非自然生立為有體自然生者即聖父子論中所說是有自相故不同餘經說依他起是有自相言由分別是有體故立為有體者義謂是由分別增上立為有故乃立為有非自相有由諸分別增上所立於名言中分辨有無之別故亦不同由分別力立繩為蛇言諸法性俱非有體無體者意說於前遍計執性中無於破除彼為性中有由是因緣當知般若經中餘品所說一切諸法皆唯假名容誤解處即由此品辨論決擇并辨三相有無之別即是建樹前說諸經諸有智者最易發生誤解之處謂般若經自亦如同解深密經決擇三世一切諸佛同一妙道般若波羅密多經是不了義即彌勒問品此品之義諸大中觀師未見詳解故廣決擇戊二顯示破勝義有以何正理而為上首分三己初明正理上首己二以彼破自相之理己三破已無性是否所立今初此宗破除諸法於勝義有以何正理而為上首如入中論云論中觀擇非貪諍為解脫故說彼理謂中論中所說一切正理觀擇皆是為令有情證得解脫諸有情類唯由執著人法二我繫縛生死由緣何事而起我想謂緣補特伽羅及彼相續之法執彼二為二我即是繫縛之上首其正理謂依何事破除我執所依上首亦即彼二故諸正理悉皆攝入破二我中入中論所說決擇真實諸理釋論攝為決擇二無我時說以破四生諸理顯法無我又說十地經中以十種平等性悟入六地由以正理明一切法無生平等性故其餘法平等性皆易顯了是故論師密意先說諸法不自生等故成立法無我之上首正理即破四生之理此如入中論云諸法非無因非自在等因非自他俱生故是依緣生由法依緣生分別莫能觀故此緣起理斷諸惡見網謂外法苗等內法行等由依種子及無明等因緣而生故彼等生空無自相之體及非從自他二俱無因而生是以正理中王緣起正理能斷一切惡見網者而破彼執破除人我上首正理入中論云彼於真實或世間以七種相皆不成然由世間無分別依諸支分而假立謂如車與支於一異二俱能依所依積聚聚形七相尋求皆不可得然依自支立為假有補特伽羅亦如是立說此即是易得深見所有方便故當了知此諸正理即破人我上首之理入中論云七相所無云何有此有觀行無所得由此亦易入真實如彼所成此亦許謂先於補特伽羅七相尋求而無所得及依自蘊而假施設此易了悟故引導漸次亦應如是此亦由依諸蘊假立故於七相不能獲得補特伽羅即補特伽羅無我之義仍以緣起之理而為究竟如是以緣生因及假立因破法及補特伽羅自生等四及自性一異等七當知此即諸理上首己二以彼破自相之理若爾以緣起因雖於世俗亦破自相是為此宗解釋聖者意趣特法彼中不共破理云何此最切要茲當解說入中論本說三種理釋說一理共四理破其中初理聖根本智應是壞法之因謂若諸法有自相之體瑜伽行者證一切法無自性時彼智應有色受等可得然不可得故色等應無若法先有後無是為破壞其能壞因應即彼智然說彼智是能壞因不應道理故一切時不許自相生入中論云若法依自相謗彼壞法故空是壞法因非理故無事若謂唯自相有不須聖智可得若勝義有乃須可得然不許爾說有自相唯名言故此雖是根本救難然不能救於後理時茲當廣說又世俗諦應堪正理觀察謂若諸法有自相者例如言生觀察施設名言假立義時為此苗芽從異性種而生耶從同性而生耶以此觀察應有可得若不爾者應唯名言增上假立全無自性所成義故若作如是尋求觀察其真實體唯無生滅無餘生等可得故不應執諸世俗義如是觀察為有可得入中論云若觀此諸法離實無可得故不應觀察世間名言諦此如前說由齊幾許觀察為觀不觀真實性理界有不同故以此說觀察之理縱堪觀察然不說為堪忍觀察實不實有正理所觀故說無過此是救難根本與前救難同一關要其不能救難之理如前數說月稱論師即於此處及餘諸處說世俗有即是世間名言中有世間名言所立人法皆不觀察名言之義為如何有而便安立故此逆品觀察而立即勝義有故有自相即應堪忍理智觀察及證勝義智之所得若謂非由無亂根識等顯現增上之所安立許法自性增上而有是勝義有今許諸法非由自性增上而有唯由無亂識顯現增上而有即是世間名言中有非由名之名言增上安立若爾經說一切諸法唯名唯言唯是假立及說唯由世間名言而有非勝義有皆成相違若觀名言假立之義為如何有而有可得則其唯字為遮何事云何可說唯由世間名言而有又與世間所許名言假立之義亦極相違汝既不許其義雖復說是世間名言中有亦唯虛說而已尋求觀察補特伽羅名言之義不可以所得義而立為補特伽羅者謂七相觀察觀察生等諸法名言之義不可以有所得義而立為生等法者謂於名言亦破他生等理應知餘處已廣決擇如云苗生及云我見如是人法名言與云苗從異體種生及云實體我見是諸名言若求名言為依何義二俱無得雖無差別然於假立義有無餘量能為違難則極不同以前二事於名言有其後二事名言亦無復須善判理智違害與不堪觀察所有差別及理智不得其有與見為無最大差別此等俱如餘處廣說有未圓滿如是審細判別觀慧以少似理破勝義有以少亂識取世俗有便想唯於彼前安立為有謂世俗義唯於亂識而為有故若爾從大自在及自性等生諸苦樂與從黑白二業生諸苦樂是則俱是非則俱非等無差別以如前觀察其能觀智後亦無得若於亂識前亦有故入中論云此非我執依不許世俗有又云二無知擾亂外道所計我計幻陽焰等世間亦非有此說自他諸部及外邪宗不共增益并於幻事執為象馬及於陽焰執為水等此諸境事於世俗無應非道理以諸亂覺應不如是執及於亂識有即名言有故又以諸理破自他生等於名言無亦應不能破又不可說彼諸錯亂非從無始展轉傳來庸常有情所有錯亂此不觀察是由無始展轉傳來亂識於此前有立世俗有故無過失若爾則執前後為一所有常執及執人法由自相生俱生我執此所執境於名言中亦應有故故名言有若以理智觀如何有而有所得則成相違然須理智所不違害餘名言量亦不能害以名言有須量成故若如是者說名言有唯是名言增上安立則成相違答云無過如云補特伽羅是世俗有唯由名言增上安立唯字是遮補特伽羅不由名言增上安立非遮補特伽羅是量所成亦非顯示凡由名言增上安立一切皆是世俗有若爾為遮何等非由名言增上立耶謂補特伽羅名言立義若自相有則彼義是由自性有非由能緣名言增上而有即遮彼義理智雖能遮如是義然云祠授所見若無此名言義則被名言量所違害故能成立為有義與名言二者之中若非由義自性而有必然即成唯由名言增上而有故若觀察真勝義諦是如何有亦唯如是故說彼有亦由名言增上而立然非是說以名言量立勝義諦說於名言識前立有勝義諦者亦因理智行相不執勝義為有非說以彼成立佛護亦說佛依名言增上說有生等及說生等唯是言說諸自續師說立名言有諸無亂識是於現境或所著境有自相義為無錯亂此宗則許雖於現境錯亂亦有衆多能立境者故此二宗說無亂識有無之亂亦大差殊即於如是名言增上之有說名假有非是彼法實非彼事假立為彼說名假有故於此宗佛及有情繫縛解脫等一切應理而於他宗皆不得成此二論師之所解釋即聖父子究竟意趣若於此中無處可立諸建立者是太串習凡有實在因果等法便執一切皆有自相所致尚未能解緣起之義即性空義故當了知是住此宗最大歧途又應不能破勝義生謂許諸法於名言中由自相有若以觀察自他生理而不能破則以如是觀察破勝義有亦應不能破然彼非理故於名言能破自相由自相有即勝義有故破勝義生之理亦能於名言破自相有故自相生二諦俱無入中論云於真性時由何理破自他生皆非理彼理亦於名言破故汝許生由何有經說諸法皆自性空應非正理顯示初理之釋論中引迦葉問品成自相空云復次迦葉正觀諸法之中道非由空性令諸法空是諸法自空如是非由無相無願無作無生無起而令諸法無相乃至無起是諸法自無相乃至諸法自無起亦說此文顯唯識空不應道理謂若諸法有自相體則彼諸法非是自空經說諸法自空不應道理若非就自體破除自性應由餘法空故顯示為空經說非由空性令諸法空則成相違總之彼非由自性空自空之義故若不許諸法由自相空縱名自空然實未脫他空唯識諸師明依他起無有異體能所取時亦非是用無自性義破依他起如所依事無所破體及彼所依由所破空二家相同然說諸法由自相空即是自體空義其餘之空非自體空其中因相謂若以量成立前空乃至未失功力之時其由宗派增益妄執彼事實有及執實義定不得生若以正量成立後義功力未失然起宗派增益實有及執實義而無相違己三破已無性是否所立若爾於補特伽羅及法為唯以因破除自性別無所立為亦以因立無性耶答此須先知二種破相故當釋彼所言破者謂言說時由言所詮遮遣所破而能通達或於心中現彼相時須現遮遣所破為相乃能通達初如無我次如法性此雖於言詮未遮所破然現彼義時須現遮遣戲論為相如是由遮所破乃證之義總有二種一者非遮謂正遮所破別引餘法分別熾然論云言非遮者謂由破除此法自性離此法外成立其餘諸法自性如遮云此非婆羅門是離如此婆羅門外成立為餘非婆羅門無諸勝行缺少聞等首陀種姓二者無遮謂正遮所破不引餘法分別熾然論云言無遮者謂唯破除此法自性不別成立此外餘法如云婆羅門不應飲酒唯遮彼事不更詮說離彼所餘可不可飲此成不成與引不引同離彼所餘者謂非唯遮遣所破非唯言詞遮遣云非云無即彼二之差別如云非從自生清辨月稱俱說是無遮故云無量壽仍是非遮故故言遮者由一切法皆遮非自故非唯法遮自所破便為滿足要須言詮能遮所破及於能證心中現其遮遣所破為相有說如云無我是為無遮若云補特伽羅無我有所成事則非無遮餘說有所破事引餘法故非是無遮俱不應理二遮之別唯應如前餘論亦說如云婆羅門不飲酒雖有所成之事然仍安住無遮相故如婆羅門是遮所破已辨引不引餘法所依非即所引諸餘法故故引餘法其有四種一勢引二直引三俱引四時引如般若燈論釋引文云其遮由義顯一言而成立彼俱不自顯非遮餘是餘由義顯者如云祠授肥胖晝日不食一言成立餘法者如云有不自生遮遣所破及引餘法一言而詮彼俱者謂於一言若直若勢俱引餘法如云有胖祠授晝日不食而不羸瘦不以自語顯者如於一人知是剎帝利種及婆羅門種然未定其差別之時云此非婆羅門四種牽引隨有其一即是非遮除此所餘俱不牽引彼四相者離非遮外是餘無遮有先覺說中觀諸師有破自性因及比量而無成立無自性因及比量不應道理其無所立之正因及無所量之比量定非有故有餘師說中觀自續有立無我因及比量應成派無顯句論云我等非是成立此無若爾云何此唯破他遍計有性如是我等非立此有若爾云何此唯遣他遍計無性由遣二邊立中道故應成諸師唯破他宗為所須要入中論亦云遮遣諸分別智說觀行果故唯破他宗非立無性唯遮所破為所須要非應成派所有特法分別熾然論亦云唯破地等於勝義中非大種性非成餘性及無事性故破諸法有自相時云唯遮所破及云唯為除他邪執唯字是遣他疑正理境中非唯破所破更引餘法以為非遮而顯是無遮以彼唯是遮自所破不成餘法前已釋故如云海中無烟雖是唯遮海中有烟而不更引餘法然由彼語非不顯示海中無烟彼隨行覺非不決定海中無烟如是說云苗無自性雖是唯遮苗有自性然彼言覺能詮能定苗無自性何違之有故以言遮海中烟已即詮無烟其覺亦遮烟已即決定無烟以遮所破及表其破若無此一彼亦無故如是宣說無性諸教由破自性即詮無性破除自性之理智由破自性即知無性破除自性之因由破自性即立無性皆當受許不應說言教無所詮知無所知因無所立故說正理唯破自性不立無性俱非中觀因明之理前云地於勝義非大種性是說唯於勝義破大種性義謂無遮即是所立又云非成無事性者非說不成勝義大種無事義謂不成離破之外無事自性若問離遮所破立不立餘容可應理若許遮遣所破而觀其破是否正因及言覺境云何應理若以正因遮自性有即以彼因立無自性聖者說云此破除有性非即執無性如云此非黑未說此是白復云何釋答譬如唯欲顯說無黑云此非黑是唯遮黑非離彼外顯是餘白如是說苗勝義無性亦唯成立遮勝義有性非離彼外更別成立有餘無實般若燈論及疏亦說非遮非是所立無遮乃是即由彼喻亦可了知如云非黑未說不顯非黑而說不顯是白故觀音禁說觀世間品有此教文生此疑難之理謂苗若有勝義無生則須以理智成立成立苗無勝義生時其無勝義生之有應是所立由以比量成立彼故故生彼疑此無自性雖然是有而非理智成立中論釋中茲當廣說若知所立是其無遮即能了解唯立遮勝義生非立有餘勝義無生故顯句論說破他計有非成其無破計無性者謂如破云勝義無生無可執實非成有性者謂非成立有勝義生故苗芽實有與無實實有二俱可破非遮其一而表餘一然苗芽實有與彼無實則遮其一須表餘一非俱可破如回諍論云若以無自性即遮無自性遮無自性已即成有自性此顯然說若以無自性語破諸法無性則彼諸法應有自性勝義有無亦與彼同不可俱破然勝義有與勝義無是勝義有則俱可破諸實事師許若所破無實其破則實若破無實所破則實故彼不能俱破實有中觀諸師則以教理善立無緣遠離二邊甚深中道真實了義而令如來聖教心藏遍揚十方今當問云若二大車以二種理分辨佛語了不了義諸睿智王別別解釋彼二意趣復有多門其釋彼二造論論師汝隨誰行為許何家所立了義最為究竟願當宣說我作是答此諸贍部智者嚴一切善說皆尊敬然世出世緣起因摧壞一切相執境從月放出善說光啓發慧眼拘母陀觀見佛護所示道誰不善持龍猛宗如上所說二大車軌分辨佛語了不了義決擇真實此於波羅蜜多乘處處廣說即釋密教諸大論師及成就者亦皆隨順彼二隨一決擇真實更無第三故當了知此是決擇一切經咒真實義道故若不依二大車軌欲求真實義者如同生盲無牽導者而往險處若雖欲依而未久習此等諸論尤其未知此諸正理微細關要僅憑經中少數分辨了不了義之文唯以教言為歸宿者雖亦演唱真實義語然亦唯有虛言而已若見衆多真義概要猶不滿足復善串習諸大論師啓發觀照佛經眼目所立諸理粗細關要發勤精進決擇經中廣大甚深最甚深處猶如流水隨自所知即能實行願令佛教久住於世為利此諸具觀慧者故我唱此善說心藏佛意甚深甚深經受持彼教教心要能仁妙宗二勝宗於彼多論修多聞成就觀慧觀其義如理思惟微妙理咸稱妙音名稱鬘周遍一切遍主足此頌原文四句每句十五字銜二重字故分八句譯之我由猛利無間信心中蓮蕊殷重依故見經中真實義如理唱此希有語善說寶藏佛經義龍猛無著大牛王如彼解為二車軌除此豈有如是釋雖已久修廣大行善巧明處諸佛子猶難達此深廣處如實得已如理習定慧尸羅咸清淨最大歡喜遍滿心有時於佛增信樂有時感念大車恩餘時敬仰善知識於苦衆生起悲愍欲令法寶久住世此等如賽互相增其久失沒難達處由何理路而尋得此理變化甚希有雖自獨處亦笑談佛說法月於是人以稱譽鬘數數讚謂此勝慧修靜慮安住清淨尸羅頂紹隆佛種獲了義誰欲得佛如是譽具慧當學此論釋以正理路淨慧眼勵力辨此二車軌我今所集諸福善願如龍猛及無著恆持一切佛正法由是令佛生歡喜如同聰慧諸佛子普賢妙音所修行我亦遍行廣大行今此分別龍猛菩薩無自性宗無著大士唯識相宗二大車軌顯了辨析經中了不了義名曰善說心藏釋迦苾芻多聞演理東宗喀巴善慧名稱吉祥造持律沙門福慧書民國念五年佛成道日譯在西藏拉薩多門新第三樓丈室
